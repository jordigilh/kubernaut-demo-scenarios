# Vertex AI LLM credentials example
# Copy this file, fill in your values, and apply:
#   kubectl apply -f my-vertex-ai-credentials.yaml -n kubernaut-system
#
# Required: GCP project with Vertex AI API enabled and model access
# Authentication: Application Default Credentials (ADC) or service account key
#
# NOTE: All values below are plaintext placeholders. Replace with your actual values.
#
# To include the ADC JSON file directly, use kubectl create secret instead:
#   kubectl create secret generic llm-credentials -n kubernaut-system \
#     --from-literal=VERTEXAI_PROJECT="your-gcp-project-id" \
#     --from-literal=VERTEXAI_LOCATION="us-east5" \
#     --from-literal=GOOGLE_APPLICATION_CREDENTIALS="/etc/kubernaut-agent/credentials/application_default_credentials.json" \
#     --from-file=application_default_credentials.json="$HOME/.config/gcloud/application_default_credentials.json"
apiVersion: v1
kind: Secret
metadata:
  name: llm-credentials
  namespace: kubernaut-system
stringData:
  VERTEXAI_PROJECT: "your-gcp-project-id"
  VERTEXAI_LOCATION: "us-east5"
  # Mount path where kubernaut-agent expects the ADC file
  GOOGLE_APPLICATION_CREDENTIALS: "/etc/kubernaut-agent/credentials/application_default_credentials.json"
  # Paste the contents of ~/.config/gcloud/application_default_credentials.json here,
  # or use the kubectl create secret command above to reference the file directly.
  application_default_credentials.json: |
    {
      "type": "authorized_user",
      "client_id": "your-client-id",
      "client_secret": "your-client-secret",
      "refresh_token": "your-refresh-token"
    }
