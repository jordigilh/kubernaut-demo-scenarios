# OCP-specific value overrides for the Kubernaut Helm chart.
# Layered on top of the chart's own values-ocp.yaml (which provides
# postgresql.variant, Red Hat images, and ose-cli hook image).
global:
  image:
    tag: "v1.1.0-rc0"

tls:
  mode: cert-manager
  certManager:
    issuerRef:
      name: selfsigned-issuer
      kind: ClusterIssuer
      group: cert-manager.io

gateway:
  auth:
    signalSources:
      - name: alertmanager
        serviceAccount: alertmanager-main
        namespace: openshift-monitoring

datastorage:
  dbExistingSecret: kubernaut-ds-db-credentials

postgresql:
  auth:
    existingSecret: kubernaut-pg-credentials

valkey:
  existingSecret: kubernaut-valkey-credentials

effectivenessmonitor:
  external:
    prometheusUrl: "http://prometheus-k8s.openshift-monitoring.svc:9091"
    alertManagerUrl: "http://alertmanager-main.openshift-monitoring.svc:9094"
