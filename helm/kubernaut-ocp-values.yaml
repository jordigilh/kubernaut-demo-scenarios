# OCP-specific value overrides for the Kubernaut Helm chart (v1.1.0+).
# No NodePort, no nodeSelector (OCP schedules to worker nodes).
# cert-manager TLS mode (OCP has cert-manager installed).
tls:
  mode: cert-manager
  certManager:
    issuerRef:
      name: selfsigned-issuer
      kind: ClusterIssuer
      group: cert-manager.io

gateway:
  auth:
    signalSources:
      - name: alertmanager
        serviceAccount: alertmanager-main
        namespace: openshift-monitoring

effectivenessmonitor:
  external:
    prometheusUrl: "http://prometheus-k8s.openshift-monitoring.svc:9091"
    prometheusEnabled: true
    alertManagerUrl: "http://alertmanager-main.openshift-monitoring.svc:9094"
    alertManagerEnabled: true
