# OCP-specific value overrides for the Kubernaut Helm chart (v1.1.0+).
# No NodePort, no nodeSelector (OCP schedules to worker nodes).
# cert-manager TLS mode (requires openshift-cert-manager-operator from OperatorHub).
tls:
  mode: cert-manager
  certManager:
    issuerRef:
      name: selfsigned-issuer
      kind: ClusterIssuer
      group: cert-manager.io

gateway:
  auth:
    signalSources:
      - name: alertmanager
        serviceAccount: alertmanager-main
        namespace: openshift-monitoring

# EffectivenessMonitor: Prometheus/AlertManager disabled until the chart
# adds TLS CA support (kubernaut#452). OCP monitoring serves HTTPS only;
# the EM's HTTP clients cannot validate the service-serving CA today.
# When enabled, use https:// URLs and set tlsCaFile once supported.
effectivenessmonitor:
  external:
    prometheusUrl: "https://prometheus-k8s.openshift-monitoring.svc:9091"
    prometheusEnabled: false
    alertManagerUrl: "https://alertmanager-main.openshift-monitoring.svc:9094"
    alertManagerEnabled: false
