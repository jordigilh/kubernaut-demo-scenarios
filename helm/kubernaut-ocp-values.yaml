# OCP-specific value overrides for the Kubernaut Helm chart (v1.1.0-rc4+).
# No NodePort, no nodeSelector (OCP schedules to worker nodes).
# cert-manager TLS mode (OCP has cert-manager installed).
tls:
  mode: cert-manager
  certManager:
    issuerRef:
      name: selfsigned-issuer
      kind: ClusterIssuer
      group: cert-manager.io

gateway:
  auth:
    signalSources:
      - name: alertmanager
        serviceAccount: alertmanager-main
        namespace: openshift-monitoring

# EffectivenessMonitor: full Prometheus/AlertManager integration on OCP.
# TLS CA support added in kubernaut#452 (1.1.0-rc2+). The service-serving
# CA is injected by the chart via the openshift-service-ca.crt ConfigMap.
#
# OCP's kube-state-metrics scrape interval is 1m (vs 30s on Kind).
# Increase stabilizationWindow so the EM doesn't sample stale metrics
# before kube-state-metrics reflects the post-remediation state.
# See kubernaut-demo-scenarios#293 and kubernaut#625.
effectivenessmonitor:
  config:
    assessment:
      stabilizationWindow: "120s"
  external:
    prometheusUrl: "https://prometheus-k8s.openshift-monitoring.svc:9091"
    prometheusEnabled: true
    alertManagerUrl: "https://alertmanager-main.openshift-monitoring.svc:9094"
    alertManagerEnabled: true
    tlsCaFile: "/etc/ssl/em/service-ca.crt"
    ocpMonitoringRbac: true

# HolmesGPT API: Prometheus integration for LLM investigation context (1.1.0-rc3+).
# Grants cluster-monitoring-view RBAC and injects the OCP service-serving CA.
# When using quickstart LLM config (--set llm.provider/model), the chart auto-
# configures the prometheus/metrics toolset. With sdkConfigContent or
# existingSdkConfigMap, add the prometheus toolset to your SDK config manually.
holmesgptApi:
  prometheus:
    enabled: true
    url: "https://prometheus-k8s.openshift-monitoring.svc:9091"
    ocpMonitoringRbac: true

# Remediation Orchestrator: reduce gitOpsSyncDelay for webhook-based ArgoCD.
# When using a Gitea->ArgoCD webhook, sync is near-instant; the default 3m is
# unnecessary. Set to 30s to match Kind. Omit this block if your OCP deployment
# does not use webhooks for ArgoCD sync.
remediationorchestrator:
  config:
    asyncPropagation:
      gitOpsSyncDelay: "30s"

# PostgreSQL: use the Red Hat RHEL10 image for OCP (restricted-v2 SCC compatible).
# Data directory is image-agnostic at /var/lib/kubernaut-pg/data (see kubernaut#464).
postgresql:
  variant: ocp
  image: registry.redhat.io/rhel10/postgresql-16
