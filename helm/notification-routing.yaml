# Advanced notification routing configuration for Kubernaut demos.
#
# QUICKSTART: For Slack-only notifications, you do NOT need this file.
# The chart generates routing automatically when you set:
#   --set notification.slack.secretName=slack-webhook
#   --set notification.slack.channel="#demo-notifications"
# platform-helper.sh handles this via the KUBERNAUT_SLACK_CHANNEL env var.
#
# ADVANCED: Use this file only for multi-receiver routing (e.g., different
# channels per notification type, PagerDuty integration, etc.).
# Pass via: helm install ... --set-file notification.routing.content=helm/notification-routing.yaml
#
# Prerequisites:
#   - A Slack webhook URL stored in a K8s Secret (see platform-helper.sh)
#   - notification.credentials[] configured to mount the Secret

route:
  receiver: default-console
  routes:
    - match:
        type: escalation
      receiver: slack-alerts
    - match:
        type: approval_required
      receiver: slack-alerts
    - match:
        type: failed
      receiver: slack-alerts

receivers:
  - name: default-console
    consoleConfigs:
      - enabled: true
    slackConfigs:
      - channel: "#demo-notifications"
        credentialRef: slack-webhook
  - name: slack-alerts
    slackConfigs:
      - channel: "#demo-notifications"
        credentialRef: slack-webhook
