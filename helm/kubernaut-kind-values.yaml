# Kind-specific value overrides for the Kubernaut Helm chart.
# Exposes gateway and datastorage via NodePort so they are accessible
# from the host via Kind's extraPortMappings.
#
# All platform pods are pinned to the control-plane node so that
# worker nodes remain available for demo fault-injection scenarios
# (e.g. podman pause) without disrupting the platform.
#
# K8s >=1.30 requires numeric runAsUser when runAsNonRoot is set.
# The chart images use named users, so we override here with UID 65534 (nobody).
global:
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

gateway:
  service:
    type: NodePort
  auth:
    signalSources:
      - name: alertmanager
        serviceAccount: kube-prometheus-stack-alertmanager
        namespace: monitoring
  containerSecurityContext:
    runAsUser: 65534

datastorage:
  service:
    type: NodePort
  containerSecurityContext:
    runAsUser: 65534

notification:
  containerSecurityContext:
    runAsUser: 65534

authwebhook:
  containerSecurityContext:
    runAsUser: 65534

effectivenessmonitor:
  containerSecurityContext:
    runAsUser: 65534

monitoring:
  prometheus:
    enabled: true
    url: "http://kube-prometheus-stack-prometheus.monitoring.svc:9090"
  alertManager:
    enabled: true
    url: "http://kube-prometheus-stack-alertmanager.monitoring.svc:9093"

remediationorchestrator:
  config:
    asyncPropagation:
      gitOpsSyncDelay: "30s"
  containerSecurityContext:
    runAsUser: 65534

signalprocessing:
  containerSecurityContext:
    runAsUser: 65534

workflowexecution:
  containerSecurityContext:
    runAsUser: 65534

aianalysis:
  containerSecurityContext:
    runAsUser: 65534

# Kind clusters do not need NetworkPolicies; the chart's default deny-all
# ingress rules block inter-service traffic because the monitoring namespace
# and service ports differ from the OCP assumptions baked into the chart.
networkPolicies:
  enabled: false
