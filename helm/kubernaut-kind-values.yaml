# Kind-specific value overrides for the Kubernaut Helm chart (v1.2.0-rc2).
# Exposes gateway and datastorage via NodePort so they are accessible
# from the host via Kind's extraPortMappings.
#
# All platform pods are pinned to the control-plane node so that
# worker nodes remain available for demo fault-injection scenarios
# (e.g. podman pause) without disrupting the platform.
#
# K8s >=1.30 requires numeric runAsUser when runAsNonRoot is set.
# The chart images use named users, so we override here with UID 65534 (nobody).
#
# image.tag must match the rc tag in quay.io; the chart's appVersion
# (1.2.0) has no published images — only the rc tags do.
global:
  image:
    tag: "1.2.0-rc2"
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

gateway:
  service:
    type: NodePort
  auth:
    signalSources:
      - name: alertmanager
        serviceAccount: kube-prometheus-stack-alertmanager
        namespace: monitoring
  containerSecurityContext:
    runAsUser: 65534

datastorage:
  service:
    type: NodePort
  containerSecurityContext:
    runAsUser: 65534

notification:
  containerSecurityContext:
    runAsUser: 65534

authwebhook:
  containerSecurityContext:
    runAsUser: 65534

effectivenessmonitor:
  external:
    prometheusEnabled: true
    alertManagerEnabled: true
  containerSecurityContext:
    runAsUser: 65534

remediationorchestrator:
  config:
    asyncPropagation:
      gitOpsSyncDelay: "30s"
  containerSecurityContext:
    runAsUser: 65534

signalprocessing:
  containerSecurityContext:
    runAsUser: 65534

workflowexecution:
  containerSecurityContext:
    runAsUser: 65534

aianalysis:
  containerSecurityContext:
    runAsUser: 65534
