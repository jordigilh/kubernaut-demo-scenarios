# Kind-specific value overrides for the Kubernaut Helm chart.
# Exposes gateway, datastorage, and holmesgpt-api via NodePort
# so they are accessible from the host via Kind's extraPortMappings.
#
# All platform pods are pinned to the control-plane node so that
# worker nodes remain available for demo fault-injection scenarios
# (e.g. podman pause) without disrupting the platform.
#
# K8s >=1.30 requires numeric runAsUser when runAsNonRoot is set.
# The chart images use named users, so we override here with UID 65534 (nobody).
global:
  image:
    tag: "v1.1.0-pre1"
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

gateway:
  service:
    type: NodePort
    nodePort: 30080
  auth:
    signalSources:
      - name: alertmanager
        serviceAccount: kube-prometheus-stack-alertmanager
        namespace: monitoring
  containerSecurityContext:
    runAsUser: 65534

datastorage:
  dbExistingSecret: kubernaut-ds-db-credentials
  service:
    type: NodePort
    nodePort: 30081
  containerSecurityContext:
    runAsUser: 65534

postgresql:
  auth:
    existingSecret: kubernaut-pg-credentials

notification:
  slack:
    enabled: true
    channel: "#kubernaut-alerts"
  containerSecurityContext:
    runAsUser: 65534

holmesgptApi:
  service:
    type: NodePort
    nodePort: 30088

authwebhook:
  containerSecurityContext:
    runAsUser: 65534

effectivenessmonitor:
  containerSecurityContext:
    runAsUser: 65534

remediationorchestrator:
  containerSecurityContext:
    runAsUser: 65534

signalprocessing:
  containerSecurityContext:
    runAsUser: 65534

workflowexecution:
  containerSecurityContext:
    runAsUser: 65534

aianalysis:
  containerSecurityContext:
    runAsUser: 65534
