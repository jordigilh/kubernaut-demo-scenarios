# AIAnalysis Controller
# Extracted from: test/infrastructure/aianalysis_e2e.go
# Stripped: coverage volumes, NodePort
---
# Rego approval gate policy
apiVersion: v1
kind: ConfigMap
metadata:
  name: aianalysis-policies
  namespace: kubernaut-system
data:
  approval.rego: |
    package aianalysis.approval
    import rego.v1

    default require_approval := false
    default reason := "Auto-approved"

    require_approval if { lower(input.environment) == "production" }

    require_approval if {
        input.remediation_target
        input.remediation_target.kind == "StatefulSet"
    }
    require_approval if {
        input.remediation_target
        input.remediation_target.kind == "Node"
    }
    require_approval if { not input.remediation_target }
    require_approval if { count(input.warnings) > 0 }

    risk_factors contains {"score": 90, "reason": "Missing remediation target"} if {
        not input.remediation_target
    }
    risk_factors contains {"score": 80, "reason": "Sensitive resource kind requires manual approval"} if {
        input.remediation_target
        input.remediation_target.kind == "StatefulSet"
    }
    risk_factors contains {"score": 80, "reason": "Sensitive resource kind requires manual approval"} if {
        input.remediation_target
        input.remediation_target.kind == "Node"
    }
    risk_factors contains {"score": 75, "reason": "LLM raised warnings — human review recommended"} if {
        count(input.warnings) > 0
    }
    risk_factors contains {"score": 70, "reason": "Production environment requires manual approval"} if {
        lower(input.environment) == "production"
    }

    all_scores contains f.score if { some f in risk_factors }
    max_risk_score := max(all_scores) if { count(all_scores) > 0 }
    reason := f.reason if { some f in risk_factors; f.score == max_risk_score }
---
# ADR-030: AIAnalysis controller configuration (YAML ConfigMap)
# Per CRD_FIELD_NAMING_CONVENTION.md: camelCase for YAML fields
apiVersion: v1
kind: ConfigMap
metadata:
  name: aianalysis-config
  namespace: kubernaut-system
data:
  config.yaml: |
    controller:
      metricsAddr: ":9090"
      healthProbeAddr: ":8081"
      leaderElection: false
      leaderElectionId: "aianalysis.kubernaut.ai"
    holmesgpt:
      url: "http://holmesgpt-api:8080"
      timeout: "180s"
      sessionPollInterval: "15s"
    datastorage:
      url: "http://data-storage-service.kubernaut-system.svc.cluster.local:8080"
      timeout: "10s"
      buffer:
        bufferSize: 20000
        batchSize: 1000
        flushInterval: "1s"
        maxRetries: 3
    rego:
      policyPath: "/etc/aianalysis/policies/approval.rego"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aianalysis-controller
  namespace: kubernaut-system
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aianalysis-controller
rules:
  - apiGroups: ["kubernaut.ai"]
    resources: ["aianalyses"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["aianalyses/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aianalysis-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aianalysis-controller
subjects:
  - kind: ServiceAccount
    name: aianalysis-controller
    namespace: kubernaut-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: holmesgpt-api-client
rules:
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["holmesgpt-api"]
    verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aianalysis-controller-holmesgpt-access
  namespace: kubernaut-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: holmesgpt-api-client
subjects:
  - kind: ServiceAccount
    name: aianalysis-controller
    namespace: kubernaut-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aianalysis-controller-datastorage-access
  namespace: kubernaut-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: data-storage-client
subjects:
  - kind: ServiceAccount
    name: aianalysis-controller
    namespace: kubernaut-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aianalysis-controller
  namespace: kubernaut-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aianalysis-controller
  template:
    metadata:
      labels:
        app: aianalysis-controller
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: aianalysis-controller
      containers:
        - name: aianalysis
          image: quay.io/kubernaut-ai/aianalysis:demo-v1.0
          imagePullPolicy: IfNotPresent
          # ADR-030: Single -config flag; all functional config in YAML ConfigMap
          env:
            - name: CONFIG_PATH
              value: /etc/aianalysis/config.yaml
          args:
            - "-config"
            - "$(CONFIG_PATH)"
          ports:
            - containerPort: 8080
            - containerPort: 9090
            - containerPort: 8081
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/aianalysis
              readOnly: true
            - name: rego-policies
              mountPath: /etc/aianalysis/policies
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: aianalysis-config
        - name: rego-policies
          configMap:
            name: aianalysis-policies
---
apiVersion: v1
kind: Service
metadata:
  name: aianalysis-controller
  namespace: kubernaut-system
spec:
  type: ClusterIP
  selector:
    app: aianalysis-controller
  ports:
    - name: api
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9090
      targetPort: 9090
    - name: health
      port: 8081
      targetPort: 8081
