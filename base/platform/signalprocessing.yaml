# SignalProcessing Controller
# ADR-060: Unified Rego policy (single policy.rego)
---
# 1. Unified SignalProcessing Policy (ADR-060)
apiVersion: v1
kind: ConfigMap
metadata:
  name: signalprocessing-policy
  namespace: kubernaut-system
data:
  policy.rego: |
    package signalprocessing
    import rego.v1

    # ========== Environment Classification (BR-SP-051) ==========
    default environment := {"environment": "unknown", "source": "default"}
    environment := {"environment": env, "source": "namespace-labels"} if {
      env := input.namespace.labels["kubernaut.ai/environment"]
      env != ""
    }
    environment := {"environment": "production", "source": "namespace-name"} if {
      not input.namespace.labels["kubernaut.ai/environment"]
      input.namespace.name == "production"
    }
    environment := {"environment": "production", "source": "namespace-name"} if {
      not input.namespace.labels["kubernaut.ai/environment"]
      input.namespace.name == "prod"
    }
    environment := {"environment": "staging", "source": "namespace-name"} if {
      not input.namespace.labels["kubernaut.ai/environment"]
      input.namespace.name == "staging"
    }
    environment := {"environment": "development", "source": "namespace-name"} if {
      not input.namespace.labels["kubernaut.ai/environment"]
      input.namespace.name == "development"
    }
    environment := {"environment": "development", "source": "namespace-name"} if {
      not input.namespace.labels["kubernaut.ai/environment"]
      input.namespace.name == "dev"
    }

    # ========== Severity Determination (BR-SP-105) ==========
    default severity := "unknown"
    severity := "critical" if { lower(input.signal.severity) == "sev1" }
    severity := "critical" if { lower(input.signal.severity) == "p0" }
    severity := "critical" if { lower(input.signal.severity) == "p1" }
    severity := "critical" if { lower(input.signal.severity) == "error" }
    severity := "high" if { lower(input.signal.severity) == "sev2" }
    severity := "high" if { lower(input.signal.severity) == "p2" }
    severity := "high" if { lower(input.signal.severity) == "warning" }
    severity := "medium" if { lower(input.signal.severity) == "sev3" }
    severity := "low" if { lower(input.signal.severity) == "p3" }

    # ========== Priority Assignment (BR-SP-070) ==========
    default priority := {"priority": "P3", "policy_name": "default-catch-all"}
    severity_score := 3 if { lower(input.signal.severity) == "critical" }
    severity_score := 2 if { lower(input.signal.severity) == "warning" }
    severity_score := 2 if { lower(input.signal.severity) == "high" }
    severity_score := 1 if { lower(input.signal.severity) == "info" }
    default severity_score := 0
    env_scores contains 3 if { environment.environment == "production" }
    env_scores contains 2 if { environment.environment == "staging" }
    env_scores contains 1 if { environment.environment == "development" }
    env_scores contains 1 if { environment.environment == "test" }
    env_scores contains 3 if { input.namespace.labels["tier"] == "critical" }
    env_scores contains 2 if { input.namespace.labels["tier"] == "high" }
    env_score := max(env_scores) if { count(env_scores) > 0 }
    default env_score := 0
    composite_score := severity_score + env_score
    priority := {"priority": "P0", "policy_name": "score-based"} if { composite_score >= 6 }
    priority := {"priority": "P1", "policy_name": "score-based"} if { composite_score == 5 }
    priority := {"priority": "P2", "policy_name": "score-based"} if { composite_score == 4 }
    priority := {"priority": "P3", "policy_name": "score-based"} if { composite_score < 4; composite_score > 0 }

    # ========== Custom Labels (BR-SP-102) ==========
    default labels := {}
    labels[key] := value if {
      some k, v in input.namespace.labels
      startswith(k, "kubernaut.ai/label-")
      key := trim_prefix(k, "kubernaut.ai/label-")
      value := v
    }
---
# 2. Proactive Signal Mode Mappings (BR-SP-106, ADR-054)
apiVersion: v1
kind: ConfigMap
metadata:
  name: signalprocessing-proactive-signal-mappings
  namespace: kubernaut-system
data:
  proactive-signal-mappings.yaml: |
    proactive_signal_mappings:
      PredictedOOMKill: OOMKilled
      PredictedCPUThrottling: CPUThrottling
      PredictedDiskPressure: DiskPressure
      PredictedNodeNotReady: NodeNotReady
---
# 3. SignalProcessing Service Configuration (ADR-030)
apiVersion: v1
kind: ConfigMap
metadata:
  name: signalprocessing-config
  namespace: kubernaut-system
data:
  config.yaml: |
    controller:
      metricsAddr: ":9090"
      healthProbeAddr: ":8081"
      leaderElection: false
      leaderElectionId: "signalprocessing.kubernaut.ai"
    enrichment:
      cacheTtl: "5m"
      timeout: "10s"
    classifier:
      regoConfigMapName: "signalprocessing-policy"
      regoConfigMapKey: "policy.rego"
      hotReloadInterval: "30s"
    datastorage:
      url: "http://data-storage-service.kubernaut-system.svc.cluster.local:8080"
      timeout: "10s"
      buffer:
        bufferSize: 10000
        batchSize: 100
        flushInterval: "1s"
        maxRetries: 3
---
# SignalProcessing RBAC
apiVersion: v1
kind: ServiceAccount
metadata:
  name: signalprocessing-controller
  namespace: kubernaut-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: signalprocessing-controller
rules:
  - apiGroups: ["kubernaut.ai"]
    resources: ["signalprocessings", "remediationrequests"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["signalprocessings/status", "signalprocessings/finalizers"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "services", "namespaces", "nodes", "configmaps", "secrets", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: signalprocessing-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: signalprocessing-controller
subjects:
  - kind: ServiceAccount
    name: signalprocessing-controller
    namespace: kubernaut-system
---
# SignalProcessing Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: signalprocessing-controller
  namespace: kubernaut-system
  labels:
    app: signalprocessing-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: signalprocessing-controller
  template:
    metadata:
      labels:
        app: signalprocessing-controller
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: signalprocessing-controller
      terminationGracePeriodSeconds: 30
      containers:
        - name: controller
          image: quay.io/kubernaut-ai/signalprocessing:demo-v1.0
          imagePullPolicy: IfNotPresent
          args:
            - "--config=/etc/signalprocessing/config.yaml"
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 9090
              name: metrics
            - containerPort: 8081
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/signalprocessing/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: policy
              mountPath: /etc/signalprocessing/policy.rego
              subPath: policy.rego
              readOnly: true
            - name: proactive-signal-mappings
              mountPath: /etc/signalprocessing/proactive-signal-mappings.yaml
              subPath: proactive-signal-mappings.yaml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: signalprocessing-config
        - name: policy
          configMap:
            name: signalprocessing-policy
        - name: proactive-signal-mappings
          configMap:
            name: signalprocessing-proactive-signal-mappings
---
apiVersion: v1
kind: Service
metadata:
  name: signalprocessing-controller-metrics
  namespace: kubernaut-system
  labels:
    app: signalprocessing-controller
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      name: metrics
  selector:
    app: signalprocessing-controller
