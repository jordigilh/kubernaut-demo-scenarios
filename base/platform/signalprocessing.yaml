# SignalProcessing Controller
# Kustomize base for Kind and OCP deployments.
# The Helm path uses deploy/defaults/signalprocessing-policy.rego via --set-file;
# this file provides the equivalent resources for kustomize-based deploys.
---
# Unified classification policy (v1.2+, ADR-060).
# The controller reads this ConfigMap by name (via classifier.regoConfigMapName
# in the config below) and hot-reloads on changes.
# Content mirrors deploy/defaults/signalprocessing-policy.rego.
apiVersion: v1
kind: ConfigMap
metadata:
  name: signalprocessing-policy
  namespace: kubernaut-system
data:
  policy.rego: |
    package signalprocessing
    import rego.v1

    # ========== Environment Classification (BR-SP-051) ==========
    # Output PascalCase to match SP CRD enum: Production, Staging, Development, Test, Unknown
    default environment := {"environment": "Unknown", "source": "default"}

    environment := {"environment": "Production", "source": "namespace-labels"} if {
        env := input.namespace.labels["kubernaut.ai/environment"]
        lower(env) == "production"
    }
    environment := {"environment": "Staging", "source": "namespace-labels"} if {
        env := input.namespace.labels["kubernaut.ai/environment"]
        lower(env) == "staging"
    }
    environment := {"environment": "Development", "source": "namespace-labels"} if {
        env := input.namespace.labels["kubernaut.ai/environment"]
        lower(env) == "development"
    }
    environment := {"environment": "Test", "source": "namespace-labels"} if {
        env := input.namespace.labels["kubernaut.ai/environment"]
        lower(env) == "test"
    }
    environment := {"environment": "Production", "source": "namespace-name"} if {
        not input.namespace.labels["kubernaut.ai/environment"]
        lower(input.namespace.name) == "production"
    }
    environment := {"environment": "Production", "source": "namespace-name"} if {
        not input.namespace.labels["kubernaut.ai/environment"]
        lower(input.namespace.name) == "prod"
    }
    environment := {"environment": "Staging", "source": "namespace-name"} if {
        not input.namespace.labels["kubernaut.ai/environment"]
        lower(input.namespace.name) == "staging"
    }
    environment := {"environment": "Development", "source": "namespace-name"} if {
        not input.namespace.labels["kubernaut.ai/environment"]
        lower(input.namespace.name) == "development"
    }
    environment := {"environment": "Development", "source": "namespace-name"} if {
        not input.namespace.labels["kubernaut.ai/environment"]
        lower(input.namespace.name) == "dev"
    }

    # ========== Severity Normalization (BR-SP-105) ==========
    default severity := "unknown"

    severity := "critical" if { lower(input.signal.severity) == "critical" }
    severity := "high"     if { lower(input.signal.severity) == "high" }
    severity := "medium"   if { lower(input.signal.severity) == "medium" }
    severity := "medium"   if { lower(input.signal.severity) == "warning" }
    severity := "low"      if { lower(input.signal.severity) == "low" }
    severity := "low"      if { lower(input.signal.severity) == "info" }

    # ========== Priority Assignment (BR-SP-070) ==========
    default priority := {"priority": "P3", "policy_name": "default"}

    priority := {"priority": "P0", "policy_name": "production-critical"} if {
        environment.environment == "Production"
        severity == "critical"
    }
    priority := {"priority": "P1", "policy_name": "production-high"} if {
        environment.environment == "Production"
        severity == "high"
    }
    priority := {"priority": "P1", "policy_name": "staging-critical"} if {
        environment.environment == "Staging"
        severity == "critical"
    }
    priority := {"priority": "P2", "policy_name": "staging-any"} if {
        environment.environment == "Staging"
        severity != "critical"
    }

    # ========== Custom Labels (BR-SP-102) ==========
    default labels := {}

    labels := {"team": [team], "tier": [tier]} if {
        team := input.namespace.labels["kubernaut.ai/team"]
        team != ""
        tier := input.namespace.labels["kubernaut.ai/tier"]
        tier != ""
    }

    labels := {"team": [team]} if {
        team := input.namespace.labels["kubernaut.ai/team"]
        team != ""
        not input.namespace.labels["kubernaut.ai/tier"]
    }
---
# Proactive Signal Mode Mappings (BR-SP-106, ADR-054)
apiVersion: v1
kind: ConfigMap
metadata:
  name: signalprocessing-proactive-signal-mappings
  namespace: kubernaut-system
data:
  proactive-signal-mappings.yaml: |
    proactive_signal_mappings:
      PredictedOOMKill: OOMKilled
      PredictedCPUThrottling: CPUThrottling
      PredictedDiskPressure: DiskPressure
      PredictedNodeNotReady: NodeNotReady
---
# SignalProcessing Service Configuration (ADR-030)
apiVersion: v1
kind: ConfigMap
metadata:
  name: signalprocessing-config
  namespace: kubernaut-system
data:
  config.yaml: |
    controller:
      metricsAddr: ":9090"
      healthProbeAddr: ":8081"
      leaderElection: false
      leaderElectionId: "signalprocessing.kubernaut.ai"
    enrichment:
      cacheTtl: "5m"
      timeout: "10s"
    classifier:
      regoConfigMapName: "signalprocessing-policy"
      regoConfigMapKey: "policy.rego"
      hotReloadInterval: "30s"
    datastorage:
      url: "http://data-storage-service.kubernaut-system.svc.cluster.local:8080"
      timeout: "10s"
      buffer:
        bufferSize: 10000
        batchSize: 100
        flushInterval: "1s"
        maxRetries: 3
---
# SignalProcessing RBAC
apiVersion: v1
kind: ServiceAccount
metadata:
  name: signalprocessing-controller
  namespace: kubernaut-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: signalprocessing-controller
rules:
  - apiGroups: ["kubernaut.ai"]
    resources: ["signalprocessings", "remediationrequests"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["signalprocessings/status", "signalprocessings/finalizers"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "services", "namespaces", "nodes", "configmaps", "secrets", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: signalprocessing-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: signalprocessing-controller
subjects:
  - kind: ServiceAccount
    name: signalprocessing-controller
    namespace: kubernaut-system
---
# SignalProcessing Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: signalprocessing-controller
  namespace: kubernaut-system
  labels:
    app: signalprocessing-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: signalprocessing-controller
  template:
    metadata:
      labels:
        app: signalprocessing-controller
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: signalprocessing-controller
      terminationGracePeriodSeconds: 30
      containers:
        - name: controller
          image: quay.io/kubernaut-ai/signalprocessing:demo-v1.0
          imagePullPolicy: IfNotPresent
          args:
            - "--config=/etc/signalprocessing/config.yaml"
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 9090
              name: metrics
            - containerPort: 8081
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/signalprocessing/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: proactive-signal-mappings
              mountPath: /etc/signalprocessing/proactive-signal-mappings.yaml
              subPath: proactive-signal-mappings.yaml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: signalprocessing-config
        - name: proactive-signal-mappings
          configMap:
            name: signalprocessing-proactive-signal-mappings
---
apiVersion: v1
kind: Service
metadata:
  name: signalprocessing-controller-metrics
  namespace: kubernaut-system
  labels:
    app: signalprocessing-controller
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      name: metrics
  selector:
    app: signalprocessing-controller
