apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kubernaut-system

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  # PostgreSQL + DataStorage consolidated secret (#243).
  # As of v1.1.0-rc14 the Helm chart expects a single secret containing
  # both the env-var credentials and the db-secrets.yaml file.
  #
  # BREAKING CHANGE: Previously this was split into postgresql-secret (env)
  # and datastorage-db-secret (YAML file). If upgrading from rc13 or earlier,
  # delete the old datastorage-db-secret after migrating.
  - name: postgresql-secret
    type: Opaque
    envs:
      - postgresql.env
    files:
      - db-secrets.yaml

  # Valkey credentials (mounted as YAML file).
  # BREAKING CHANGE: Renamed from redis-secret to match the Helm chart
  # convention (#243). Delete the old redis-secret after migrating.
  - name: valkey-secret
    type: Opaque
    files:
      - valkey-secrets.yaml=redis-secrets.yaml

  # Slack webhook URL for notification controller
  # Source: ~/.kubernaut/notification/slack-webhook.url
  # Create with: cp ~/.kubernaut/notification/slack-webhook.url base/secrets/slack-webhook-url
  # Or manually create the file with your Slack Incoming Webhook URL
  - name: slack-webhook
    type: Opaque
    files:
      - webhook-url=slack-webhook-url
