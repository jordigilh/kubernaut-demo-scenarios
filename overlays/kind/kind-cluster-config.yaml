# Kind Cluster Configuration for Kubernaut Demo
# Usage:
#   kind create cluster --name kubernaut-demo \
#     --config overlays/kind/kind-cluster-config.yaml
#
# Kubernaut services use ClusterIP and are accessed via kubectl port-forward
# when needed. Only monitoring dashboards (Grafana) are exposed via NodePort
# for convenience.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  extraPortMappings:
  # Grafana (kube-prometheus-stack Helm chart NodePort)
  - containerPort: 30300
    hostPort: 3000
    protocol: TCP
  kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiServer:
      extraArgs:
        max-requests-inflight: "800"
        max-mutating-requests-inflight: "400"
    controllerManager:
      extraArgs:
        kube-api-qps: "100"
        kube-api-burst: "200"
- role: worker
  labels:
    kubernaut.ai/managed: "true"
