name: Build Demo Workflow Images

# Builds multi-arch (amd64 + arm64) exec images for all demo scenarios and
# pushes them to quay.io/kubernaut-cicd/test-workflows.
#
# Architecture builds run in parallel via a matrix strategy. Once all per-arch
# images are pushed, a dependent job creates manifest lists, bumps workflow
# spec.version, updates bundle digests, and opens a PR.
#
# Authority: kubernaut#350 (Multi-arch builds for demo workflow job images)

on:
  push:
    branches: [main]
    paths:
      - 'deploy/remediation-workflows/**'
      - 'scripts/build-demo-workflows.sh'
      - 'scripts/workflow-mappings.sh'
      - '.github/workflows/build-demo-workflows.yml'
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Single scenario to build (empty = all)'
        required: false
        type: string
      arch:
        description: 'Architectures (comma-separated, default: amd64,arm64)'
        required: false
        default: 'amd64,arm64'
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  # ------------------------------------------------------------------
  # Compute the architecture matrix from workflow_dispatch inputs.
  # On push events, defaults to ["amd64","arm64"].
  # ------------------------------------------------------------------
  prepare:
    name: Prepare Build Matrix
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    outputs:
      arch-matrix: ${{ steps.matrix.outputs.value }}
    steps:
      - id: matrix
        run: |
          INPUT="${{ inputs.arch || 'amd64,arm64' }}"
          echo "value=$(echo "$INPUT" | jq -Rc 'split(",")')" >> "$GITHUB_OUTPUT"

  # ------------------------------------------------------------------
  # Build and push per-arch images in parallel.
  # Each matrix leg builds for exactly one architecture.
  # ------------------------------------------------------------------
  build-arch:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: prepare
    timeout-minutes: 45
    strategy:
      fail-fast: true
      matrix:
        arch: ${{ fromJson(needs.prepare.outputs.arch-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install QEMU for cross-arch builds
        if: matrix.arch != 'amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
          if [ -f /proc/sys/fs/binfmt_misc/qemu-aarch64 ]; then
            echo "QEMU aarch64 registered"
          else
            echo "::warning::QEMU aarch64 not registered in binfmt_misc"
          fi

      - name: Login to Quay.io
        run: |
          podman login -u "${{ secrets.QUAY_ROBOT_USERNAME }}" \
                       -p "${{ secrets.QUAY_ROBOT_TOKEN }}" \
                       quay.io

      - name: Build and push ${{ matrix.arch }} images
        run: |
          ARGS=(--arch "${{ matrix.arch }}" --build-only)
          if [ -n "${{ inputs.scenario }}" ]; then
            ARGS+=(--scenario "${{ inputs.scenario }}")
          fi
          bash scripts/build-demo-workflows.sh "${ARGS[@]}"

  # ------------------------------------------------------------------
  # Once all per-arch images are pushed, create manifest lists, bump
  # spec.version, update bundle digests, and open a PR.
  # ------------------------------------------------------------------
  create-manifests:
    name: Create Manifests & Update CRDs
    runs-on: ubuntu-latest
    needs: build-arch
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo
          skopeo --version

      - name: Login to Quay.io
        run: |
          podman login -u "${{ secrets.QUAY_ROBOT_USERNAME }}" \
                       -p "${{ secrets.QUAY_ROBOT_TOKEN }}" \
                       quay.io

      - name: Create manifests and update workflow CRDs
        run: |
          ARGS=(--manifest-only)
          if [ -n "${{ inputs.scenario }}" ]; then
            ARGS+=(--scenario "${{ inputs.scenario }}")
          fi
          if [ -n "${{ inputs.arch }}" ]; then
            ARGS+=(--arch "${{ inputs.arch }}")
          fi
          bash scripts/build-demo-workflows.sh "${ARGS[@]}"

      - name: Create PR for updated versions and bundle digests
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- 'deploy/remediation-workflows/'; then
            echo "No version/digest changes to commit."
            exit 0
          fi

          CHANGED=$(git diff --name-only -- 'deploy/remediation-workflows/' | wc -l)
          BRANCH="ci/update-bundle-digests-$(date +%Y%m%d%H%M%S)"
          REPO="${{ github.repository }}"
          COMMIT_MSG="ci: bump versions and update bundle digests for ${CHANGED} workflow(s)"

          # Use the GitHub API to create the commit so it is automatically
          # signed (verified) by GitHub, satisfying the branch protection
          # rule that requires signed commits.

          BASE_SHA=$(gh api "repos/${REPO}/git/ref/heads/main" --jq '.object.sha')
          BASE_TREE=$(gh api "repos/${REPO}/git/commits/${BASE_SHA}" --jq '.tree.sha')

          # Upload each changed file as a blob and build the tree payload
          TREE_JSON="[]"
          for FILE in $(git diff --name-only -- 'deploy/remediation-workflows/'); do
            BLOB_SHA=$(gh api "repos/${REPO}/git/blobs" \
              -f content="$(base64 -w0 "$FILE")" \
              -f encoding="base64" \
              --jq '.sha')
            TREE_JSON=$(echo "$TREE_JSON" | jq --arg p "$FILE" --arg s "$BLOB_SHA" \
              '. + [{"path": $p, "mode": "100644", "type": "blob", "sha": $s}]')
          done

          NEW_TREE=$(jq -n --arg bt "$BASE_TREE" --argjson tree "$TREE_JSON" \
            '{base_tree: $bt, tree: $tree}' \
            | gh api "repos/${REPO}/git/trees" --input - --jq '.sha')

          COMMIT_SHA=$(gh api "repos/${REPO}/git/commits" \
            -f message="$COMMIT_MSG" \
            -f tree="$NEW_TREE" \
            -f "parents[]=$BASE_SHA" \
            --jq '.sha')

          gh api "repos/${REPO}/git/refs" \
            -f ref="refs/heads/${BRANCH}" \
            -f sha="$COMMIT_SHA" > /dev/null

          echo "Created branch ${BRANCH} with verified commit ${COMMIT_SHA:0:8}"

          gh pr create \
            --title "$COMMIT_MSG" \
            --body "Auto-generated by CI after building workflow images. Bumps spec.version and updates image digests in ${CHANGED} workflow CRD(s)." \
            --base main \
            --head "$BRANCH"

          GH_TOKEN="${{ secrets.GH_APPROVE_TOKEN }}" gh pr review "$BRANCH" --approve \
            --body "Auto-approved: CI bundle digest bump"

          gh pr merge "$BRANCH" --auto --squash --delete-branch
          echo "Created, approved, and auto-merge enabled for PR on branch ${BRANCH}."
