apiVersion: kubernaut.ai/v1alpha1
kind: ActionType
metadata:
  name: migrate-emptydir-to-pvc
  namespace: kubernaut-system
spec:
  name: MigrateEmptyDirToPVC
  description:
    what: "Migrate a stateful workload from ephemeral emptyDir storage to a persistent volume claim, including database backup, GitOps-driven manifest update, and data restore."
    whenToUse: "When a node is experiencing DiskPressure caused by emptyDir growth from a database or other stateful application that should be using persistent storage. The workload must be managed via GitOps (ArgoCD)."
    whenNotToUse: "When disk pressure is caused by container logs, image layers, or other non-data sources. When the workload is stateless and does not require persistent storage. When the existing PVC simply needs expansion."
    preconditions: "The affected workload uses emptyDir for its data directory. A GitOps controller (ArgoCD) manages the namespace. The cluster has a StorageClass capable of provisioning PVCs. Sufficient healthy nodes exist to schedule backup Jobs away from the affected node."
