apiVersion: kubernaut.ai/v1alpha1
kind: ActionType
metadata:
  name: patch-hpa
  namespace: kubernaut-system
spec:
  name: PatchHPA
  description:
    what: "Patch a HorizontalPodAutoscaler to increase maxReplicas or adjust scaling thresholds."
    whenToUse: "HPA has scaled to maxReplicas but the workload still cannot handle the load, indicating the max ceiling is too low."
    whenNotToUse: "When the scaling issue is caused by a code-level performance regression. Fix the code instead of adding more replicas."
    preconditions: "HPA is at maxReplicas, CPU/memory utilization remains above target, and the cluster has capacity for additional replicas."
