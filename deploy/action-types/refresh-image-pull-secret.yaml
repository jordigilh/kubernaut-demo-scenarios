apiVersion: kubernaut.ai/v1alpha1
kind: ActionType
metadata:
  name: refresh-image-pull-secret
  namespace: kubernaut-system
spec:
  name: RefreshImagePullSecret
  description:
    what: "Recreates a missing or expired ImagePullSecret and restarts affected workloads to recover from ImagePullBackOff."
    whenToUse: "Pods are stuck in ImagePullBackOff because the referenced ImagePullSecret was deleted, expired, or contains invalid registry credentials."
    whenNotToUse: "When the image reference itself is wrong (tag does not exist, wrong registry URL). When the registry is rate-limiting pulls."
    preconditions: "The target namespace and Deployment name are known. A known-good credential template exists."
