apiVersion: kubernaut.ai/v1alpha1
kind: ActionType
metadata:
  name: cordon-drain-node
  namespace: kubernaut-system
spec:
  name: CordonDrainNode
  description:
    what: "Cordon a node to prevent new scheduling, then drain existing pods to other nodes."
    whenToUse: "A node is in NotReady state or showing signs of hardware/OS-level failure, and pods need to be relocated."
    whenNotToUse: "When only a single pod is affected. Use a pod-targeted action instead."
    preconditions: "Other healthy nodes have capacity to absorb the drained pods, and the node issue is confirmed as node-scoped."
