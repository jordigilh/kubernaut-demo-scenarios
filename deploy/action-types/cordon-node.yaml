apiVersion: kubernaut.ai/v1alpha1
kind: ActionType
metadata:
  name: cordon-node
  namespace: kubernaut-system
spec:
  name: CordonNode
  description:
    what: "Cordon a Kubernetes node to prevent new pod scheduling without evicting existing pods."
    whenToUse: "Root cause is an emerging node-level issue that warrants preventing new pods from being scheduled, but existing pods are still running and do not need immediate eviction."
    whenNotToUse: "If existing pods on the node are already failing or need to be moved to healthy nodes, use DrainNode instead."
    preconditions: "Evidence of degrading node health (intermittent errors, rising resource pressure) but existing workloads still functional."
