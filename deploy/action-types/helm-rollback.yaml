apiVersion: kubernaut.ai/v1alpha1
kind: ActionType
metadata:
  name: helm-rollback
  namespace: kubernaut-system
spec:
  name: HelmRollback
  description:
    what: "Roll back a Helm release to its previous healthy revision."
    whenToUse: "A Helm-managed workload is crashing after a helm upgrade introduced a bad configuration, and the previous Helm revision was healthy."
    whenNotToUse: "When the workload is not managed by Helm (use RollbackDeployment or GracefulRestart instead), or when the crash is caused by an external dependency failure."
    preconditions: "The Helm release has at least one previous healthy revision in its history, and the Helm tiller/controller has access to roll back."
