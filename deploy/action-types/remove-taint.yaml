apiVersion: kubernaut.ai/v1alpha1
kind: ActionType
metadata:
  name: remove-taint
  namespace: kubernaut-system
spec:
  name: RemoveTaint
  description:
    what: "Remove a taint from a Kubernetes node to allow pod scheduling."
    whenToUse: "Pods are Pending because the target node has a taint that prevents scheduling, and the taint is no longer necessary."
    whenNotToUse: "When the taint was applied intentionally for maintenance or isolation purposes."
    preconditions: "The taint condition has been resolved and the node is healthy for general workload scheduling."
