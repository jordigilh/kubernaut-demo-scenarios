apiVersion: kubernaut.ai/v1alpha1
kind: ActionType
metadata:
  name: fix-certificate
  namespace: kubernaut-system
spec:
  name: FixCertificate
  description:
    what: "Recreate a missing or corrupted CA Secret backing a cert-manager ClusterIssuer to restore certificate issuance."
    whenToUse: "A cert-manager Certificate is stuck in NotReady because the CA Secret has been deleted or corrupted, and the ClusterIssuer cannot sign."
    whenNotToUse: "When the Certificate failure is caused by DNS validation issues, incorrect certificate spec, or an expired root CA that needs rotation rather than recreation."
    preconditions: "cert-manager is installed, the ClusterIssuer exists, and the failure is specifically due to a missing or corrupted CA Secret."
