apiVersion: kubernaut.ai/v1alpha1
kind: ActionType
metadata:
  name: delete-pod
  namespace: kubernaut-system
spec:
  name: DeletePod
  description:
    what: "Delete one or more specific pods without waiting for graceful termination."
    whenToUse: "Pods are stuck in a terminal state (Terminating, Unknown) and cannot be restarted through normal means."
    whenNotToUse: "Do not use as a general restart mechanism. Use RestartPod instead for transient runtime issues."
    preconditions: "Pod is genuinely stuck and not responding to graceful termination (verify via pod events and state duration)."
