apiVersion: v1
kind: ServiceAccount
metadata:
  name: provision-node-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: provision-node-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: provision-node-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: provision-node-v1
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provision-node-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: provision-node-v1
subjects:
  - kind: ServiceAccount
    name: provision-node-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: provision-node-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: provision-node-v1
spec:
  # Node Provisioning Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Scenario: #126 -- Cluster autoscaling (Kind + Podman)
  version: "1.0.9"
  description:
    what: "Requests provisioning of a new Kubernetes node to increase cluster capacity when pods are stuck Pending"
    whenToUse: "When pods are Pending due to insufficient cluster-wide resources (CPU, memory) and no existing node has capacity"
    whenNotToUse: "When scheduling failures are caused by taints, affinity rules, or PDB constraints rather than resource exhaustion"
    preconditions: "All schedulable nodes are at or near capacity, pending pods have resource requests that cannot be satisfied"
  
  actionType: ProvisionNode
  
  labels:
    severity: [critical, high]
    environment: [production, staging, "*"]
    component: "*"
    priority: "*"
  
  execution:
    engine: job
    bundle: quay.io/kubernaut-cicd/test-workflows/provision-node-job@sha256:f5cad53022c1115cb56bb28871021dce12f86656c526db69c23854f89e50ad86
    serviceAccountName: provision-node-v1-runner
  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace with pending pods"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Label selector value for the app with pending pods"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the Kubernetes resource (e.g., Deployment)"
    - name: CLUSTER_NAME
      type: string
      required: true
      description: "Kind cluster name (for provisioner agent coordination)"
