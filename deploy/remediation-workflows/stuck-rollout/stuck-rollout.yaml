apiVersion: v1
kind: ServiceAccount
metadata:
  name: rollback-deployment-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: rollback-deployment-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rollback-deployment-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: rollback-deployment-v1
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rollback-deployment-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: rollback-deployment-v1
subjects:
  - kind: ServiceAccount
    name: rollback-deployment-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: rollback-deployment-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: rollback-deployment-v1
  namespace: kubernaut-system
spec:
  # Rollback Deployment Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Scenario: #130 -- Stuck rollout -> rollback to previous revision
  version: "1.3.4"
  description:
    what: "Rolls back a deployment to its previous working revision when the current rollout is stuck"
    whenToUse: "When a deployment rollout has exceeded its progressDeadlineSeconds and new pods cannot start (ImagePullBackOff, CrashLoopBackOff, resource issues)"
    whenNotToUse: "When the rollout is still within its deadline and may succeed with more time, or when the issue affects all revisions (cluster-wide problem)"
    preconditions: "The deployment has at least one previous successful revision in its history"
  
  actionType: RollbackDeployment
  
  labels:
    severity: [critical, low]
    environment: [production]
    component: [deployment]
    priority: "*"
  
  execution:
    engine: job
    serviceAccountName: rollback-deployment-v1-runner
    bundle: quay.io/kubernaut-cicd/test-workflows/rollback-deployment-job@sha256:e54f75d74d5400f79dd13d5dd99531bb97162859a64c91979e875e017df6d077
  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the stuck deployment"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the deployment to roll back"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Must be Deployment"
