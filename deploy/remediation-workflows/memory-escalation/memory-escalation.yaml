apiVersion: v1
kind: ServiceAccount
metadata:
  name: increase-memory-limits-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: increase-memory-limits-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: increase-memory-limits-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: increase-memory-limits-v1
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: increase-memory-limits-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: increase-memory-limits-v1
subjects:
  - kind: ServiceAccount
    name: increase-memory-limits-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: increase-memory-limits-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: increase-memory-limits-v1
spec:
  # Increase Memory Limits Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Scenario: Memory escalation -- increase limits to prevent OOMKill
  version: "1.2.0"
  description:
    what: "Increases the memory limits of a deployment's containers to prevent OOMKill events. Doubles the current memory limit by default."
    whenToUse: "When containers are being OOMKilled — including cases caused by memory leaks. Increasing limits is preferred over GracefulRestart as a first response because doubling the limit buys meaningful diagnostic time for operators, whereas a restart only resets the leak cycle for seconds to minutes. If repeated applications show declining effectiveness, the platform will escalate to human review."
    whenNotToUse: "When the issue is a namespace ResourceQuota constraint. Increasing individual pod limits cannot resolve quota exhaustion and may worsen it by requesting more memory per pod against a fixed quota ceiling. In quota exhaustion cases, escalate to human review for quota policy adjustment."
    preconditions: "The deployment exists and containers have memory limits set. The node has sufficient allocatable memory for the increased limit."
  
  actionType: IncreaseMemoryLimits
  
  labels:
    severity: [critical, high]
    environment: [production, staging]
    component: "*"
    priority: "*"
  
  execution:
    engine: job
    bundle: quay.io/kubernaut-cicd/test-workflows/increase-memory-limits-job@sha256:f106e1d480dee78fc3de9f5df62f0957e6a9f3fa11f0559822eea245362fe2e1
    serviceAccountName: increase-memory-limits-v1-runner
  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the affected deployment"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the deployment to patch"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the Kubernetes resource (e.g., Deployment)"
    - name: MEMORY_INCREASE_FACTOR
      type: string
      required: false
      default: "2"
      description: "Multiplier for current memory limit (e.g., 2 means double)"
