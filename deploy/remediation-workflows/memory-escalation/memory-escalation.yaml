apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: increase-memory-limits-v1
spec:
  # Increase Memory Limits Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Scenario: Memory escalation -- increase limits to prevent OOMKill
  version: "1.0.6"
  description:
    what: "Increases the memory limits of a deployment's containers to prevent OOMKill events. Doubles the current memory limit by default."
    whenToUse: "When containers are being OOMKilled because the memory limit is too low for the workload's legitimate requirements."
    whenNotToUse: "When the OOMKill is caused by a memory leak, or when the issue is a namespace ResourceQuota constraint. Increasing individual pod limits cannot resolve quota exhaustion and may worsen it by requesting more memory per pod against a fixed quota ceiling. In quota exhaustion cases, escalate to human review for quota policy adjustment. Check remediation history: if this workflow has been applied multiple times with declining effectiveness, escalate to human review."
    preconditions: "The deployment exists and containers have memory limits set. The node has sufficient allocatable memory for the increased limit."
  
  actionType: IncreaseMemoryLimits
  
  labels:
    severity: [critical, high]
    environment: [production, staging]
    component: "*"
    priority: "*"
  
  execution:
    engine: job
    bundle: quay.io/kubernaut-cicd/test-workflows/increase-memory-limits-job@sha256:e0ec0b95eb8b88b6c7092f0c23e79797b08638ebdef3d6cedf4f09bcde98ecac
  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the affected deployment"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the deployment to patch"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the Kubernetes resource (e.g., Deployment)"
    - name: MEMORY_INCREASE_FACTOR
      type: string
      required: false
      default: "2"
      description: "Multiplier for current memory limit (e.g., 2 means double)"
