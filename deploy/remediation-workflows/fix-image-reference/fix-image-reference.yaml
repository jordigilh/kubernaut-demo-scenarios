apiVersion: v1
kind: ServiceAccount
metadata:
  name: fix-image-reference-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: fix-image-reference-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fix-image-reference-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: fix-image-reference-v1
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fix-image-reference-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: fix-image-reference-v1
subjects:
  - kind: ServiceAccount
    name: fix-image-reference-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: fix-image-reference-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: fix-image-reference-v1
  namespace: kubernaut-system
spec:
  version: "1.5.0"
  description:
    what: "Corrects a Deployment's container image reference by reverting to the last known-good image from rollout history, recovering pods stuck in ImagePullBackOff due to a wrong tag or registry URL"
    whenToUse: "When pods are stuck in ImagePullBackOff or ErrImagePull because the container image reference points to a non-existent tag, a wrong registry URL, or a deleted image. The Deployment has at least one previous revision with a valid image in its ReplicaSet history. Common after botched image promotions, typos in CI/CD pipelines, or premature tag deletions."
    whenNotToUse: "When the image pull failure is caused by expired or missing ImagePullSecrets (authentication issue) — use RefreshImagePullSecret instead. When the registry itself is down or rate-limiting — wait for recovery. When all revisions use the same broken image (no good revision to revert to)."
    preconditions: "The Deployment has at least one previous ReplicaSet with a valid, pullable container image. The registry hosting the known-good image is accessible."

  actionType: RollbackDeployment

  labels:
    severity: [critical, high]
    environment: [production, staging]
    component: [apps/v1/Deployment]
    priority: "*"

  execution:
    engine: job
    serviceAccountName: fix-image-reference-v1-runner
    bundle: quay.io/kubernaut-cicd/test-workflows/fix-image-reference-job@sha256:86a4991d845ad3cbfbb0dcf919fcb54cbd4313645140441f333ac9a2eccf937f
  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the affected Deployment"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the Deployment with the bad image reference"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Must be Deployment"
