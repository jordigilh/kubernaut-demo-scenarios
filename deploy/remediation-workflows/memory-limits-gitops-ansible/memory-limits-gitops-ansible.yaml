apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: increase-memory-limits-gitops-v1
spec:
  # Increase Memory Limits (GitOps) Workflow Schema - Ansible Backend
  # Scenario: #312 -- OOMKill on GitOps-managed deployment -> update limits via git commit
  version: "1.0.0"
  description:
    what: "Increases the memory limits of a GitOps-managed deployment by updating the resource definition in the source Git repository and letting the GitOps controller reconcile the change"
    whenToUse: "When containers are being OOMKilled because the memory limit is too low, and the deployment is managed by a GitOps tool (ArgoCD or Flux). The new memory value must be higher than the current limit."
    whenNotToUse: "When the OOMKill is caused by a memory leak (increasing limits only delays the inevitable). When the issue is a namespace ResourceQuota constraint -- increasing individual pod limits cannot resolve quota exhaustion and may worsen it by requesting more memory per pod against a fixed quota ceiling; escalate to human review for quota policy adjustment. When the environment is not GitOps-managed (use increase-memory-limits-v1 for direct kubectl patching instead)."
    preconditions: "A GitOps tool (ArgoCD or Flux) is managing the target namespace. The source Git repository is accessible. The deployment YAML in the repo defines explicit memory limits."

  actionType: IncreaseMemoryLimits

  labels:
    severity: [critical, high]
    environment: ["*"]
    component: "*"
    priority: "*"

  detectedLabels:
    gitOpsTool: "*"

  execution:
    engine: ansible
    bundle: https://github.com/jordigilh/kubernaut-test-playbooks.git
    bundleDigest: "ecedfc88b6e3b9f0f3d4e53b10a70f02b7b3b5bb"
    engineConfig:
      playbookPath: "playbooks/gitops-update-memory-limits.yml"
      jobTemplateName: "kubernaut-gitops-update-memory"

  dependencies:
    secrets:
      - name: gitea-repo-creds

  parameters:
    - name: TARGET_NAMESPACE
      type: string
      required: true
      description: "Namespace of the affected deployment"
    - name: TARGET_DEPLOYMENT
      type: string
      required: true
      description: "Name of the deployment to update"
    - name: NEW_MEMORY_LIMIT
      type: string
      required: true
      description: "New memory limit value (e.g., 512Mi, 1Gi). Must be higher than the current limit."
