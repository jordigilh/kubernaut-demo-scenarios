apiVersion: v1
kind: ServiceAccount
metadata:
  name: cordon-drain-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: cordon-drain-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cordon-drain-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: cordon-drain-v1
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cordon-drain-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: cordon-drain-v1
subjects:
  - kind: ServiceAccount
    name: cordon-drain-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: cordon-drain-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: cordon-drain-v1
  namespace: kubernaut-system
spec:
  # Cordon + Drain Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Scenario: #127 -- Node NotReady -> cordon and drain
  version: "1.3.0"
  description:
    what: "Cordons a NotReady node to prevent new scheduling and drains existing workloads to healthy nodes"
    whenToUse: "When a node has been in NotReady state for an extended period, indicating a persistent hardware or OS-level failure"
    whenNotToUse: "When the node is briefly NotReady due to a known transient condition (e.g., kubelet restart, brief network hiccup)"
    preconditions: "The cluster has sufficient capacity on remaining nodes to absorb the drained workloads"
  
  actionType: CordonDrainNode
  
  labels:
    severity: [critical]
    environment: [production]
    component: [node]
    priority: "*"
  
  execution:
    engine: job
    serviceAccountName: cordon-drain-v1-runner
    bundle: quay.io/kubernaut-cicd/test-workflows/cordon-drain-job@sha256:d2408b0fdc0ba186130939325a22441d23aa5fd1281fda8ff771f191871df0ee
  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: false
      description: "Namespace with affected workloads on the NotReady node"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the NotReady node to cordon and drain"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Must be Node"
