apiVersion: v1
kind: ServiceAccount
metadata:
  name: restart-pods-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: restart-pods-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: restart-pods-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: restart-pods-v1
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: restart-pods-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: restart-pods-v1
subjects:
  - kind: ServiceAccount
    name: restart-pods-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: restart-pods-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: restart-pods-v1
spec:
  version: "1.2.1"
  description:
    what: "Performs a rolling restart of a deployment to recover from CrashLoopBackOff by resetting pod state without changing the deployment revision"
    whenToUse: "When a deployment enters CrashLoopBackOff and the signal carries risk_tolerance=high. This simpler restart approach prioritizes recovery speed over revision safety -- it resets pod state without rolling back to a previous revision. Best for teams that accept the risk of the current configuration and want the fastest path to recovery."
    whenNotToUse: "When the crash is caused by a persistent configuration error that will recur after restart, or when the signal carries risk_tolerance=low. In those cases, a full rollback to a known-good revision is safer."
    preconditions: "The deployment exists and the crash may be transient (resource pressure, dependency timing, stale state)."

  actionType: RollbackDeployment

  labels:
    severity: [critical, high]
    environment: [production, staging, "*"]
    component: "*"
    priority: "*"

  customLabels:
    risk_tolerance: "high"

  execution:
    engine: job
    bundle: quay.io/kubernaut-cicd/test-workflows/graceful-restart-job@sha256:4b445c9026341c01c6c8e3924c533837752f9c878848eb1de9b3be3f7a66a9dc

  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the affected deployment"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the deployment to restart"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the Kubernetes resource (e.g., Deployment)"
