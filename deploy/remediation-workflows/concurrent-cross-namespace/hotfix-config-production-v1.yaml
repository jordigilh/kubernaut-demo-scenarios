apiVersion: v1
kind: ServiceAccount
metadata:
  name: hotfix-config-production-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: hotfix-config-production-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hotfix-config-production-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: hotfix-config-production-v1
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hotfix-config-production-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: hotfix-config-production-v1
subjects:
  - kind: ServiceAccount
    name: hotfix-config-production-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: hotfix-config-production-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: hotfix-config-production-v1
  namespace: kubernaut-system
spec:
  version: "1.4.2"
  description:
    what: "Patches a faulty ConfigMap in-place to remove an invalid configuration directive, then restarts the owning Deployment so pods load the corrected configuration"
    whenToUse: "When a Deployment enters CrashLoopBackOff due to an identifiable configuration error in a mounted ConfigMap, the signal carries risk_tolerance=low, and the workload is NOT managed by Helm or GitOps. The target resource may be the ConfigMap itself or the Deployment that mounts it. This workflow patches the ConfigMap in-place, which is only appropriate for imperatively managed resources. For Helm-managed workloads, use HelmRollback instead — a Helm rollback reverts the entire release including all ConfigMaps to the previous healthy revision."
    whenNotToUse: "When the workload is managed by Helm or GitOps (ArgoCD/Flux) — use HelmRollback or GitRevert instead, as in-place ConfigMap patches will be overwritten by the next sync or upgrade. Also avoid when the configuration error cannot be identified programmatically, or when the root cause is a bad image or pod spec change rather than a ConfigMap."
    preconditions: "A Deployment mounts a ConfigMap as a volume, and the ConfigMap contains an identifiable invalid directive that can be removed to restore health."

  actionType: PatchConfiguration

  labels:
    severity: [critical, high]
    environment: [production]
    component: [configmap, deployment]
    priority: "*"

  customLabels:
    risk_tolerance: "low"

  execution:
    engine: job
    serviceAccountName: hotfix-config-production-v1-runner
    bundle: quay.io/kubernaut-cicd/test-workflows/hotfix-config-job@sha256:dc17c4e54cae249b4105492d4a911db827decbae108a067983f187b426875187

  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the affected resource"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the target resource (Deployment or ConfigMap, depending on RCA)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the target resource -- either Deployment or ConfigMap"
    - name: TARGET_CONFIGMAP_NAME
      type: string
      required: true
      description: "Name of the ConfigMap containing the faulty configuration (if TARGET_RESOURCE_KIND is ConfigMap, this may match TARGET_RESOURCE_NAME)"
