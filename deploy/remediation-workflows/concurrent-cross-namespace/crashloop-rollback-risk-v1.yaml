apiVersion: v1
kind: ServiceAccount
metadata:
  name: crashloop-rollback-risk-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: crashloop-rollback-risk-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crashloop-rollback-risk-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: crashloop-rollback-risk-v1
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crashloop-rollback-risk-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: crashloop-rollback-risk-v1
subjects:
  - kind: ServiceAccount
    name: crashloop-rollback-risk-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: crashloop-rollback-risk-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: crashloop-rollback-risk-v1
  namespace: kubernaut-system
spec:
  version: "1.3.5"
  description:
    what: "Rolls back a Deployment to its previous healthy revision to recover from CrashLoopBackOff caused by a bad configuration change (e.g., a poisoned ConfigMap) or a bad image change"
    whenToUse: "When a Deployment enters CrashLoopBackOff and the signal carries risk_tolerance=low. The root cause analysis must identify a Deployment as the target resource, since this workflow operates exclusively on Deployments by reverting to the last known-good pod template. This full rollback approach prioritizes safety over speed. Best for production teams that require guaranteed recovery with minimal risk."
    whenNotToUse: "When the root cause analysis identifies a ConfigMap as the target resource -- rolling back a Deployment does not modify the ConfigMap, so the EA pre/post hash check on the ConfigMap would show no change and the remediation would be flagged as ineffective. Use a PatchConfiguration workflow instead to directly fix the ConfigMap. Also do not use when the crash is caused by an external dependency failure, when no previous healthy revision exists, or when the signal carries risk_tolerance=high."
    preconditions: "The Deployment has at least one previous healthy revision in its rollout history. The RCA target must be a Deployment, not a ConfigMap."

  actionType: RollbackDeployment

  labels:
    severity: [critical, high, low]
    environment: [production]
    component: [deployment]
    priority: "*"

  customLabels:
    risk_tolerance: "low"

  execution:
    engine: job
    serviceAccountName: crashloop-rollback-risk-v1-runner
    bundle: quay.io/kubernaut-cicd/test-workflows/crashloop-rollback-job@sha256:cddcdcc68e2698e9a1d9034ce0d69378292e058420940aa5e517067c8860a345

  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the affected resource"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the target resource (Deployment or ConfigMap, depending on RCA)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the target resource -- either Deployment or ConfigMap"
