apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: crashloop-rollback-risk-v1
spec:
  version: "1.0.1"
  description:
    what: "Rolls back a deployment to its previous healthy revision to recover from CrashLoopBackOff caused by a bad configuration or image change"
    whenToUse: "When a deployment enters CrashLoopBackOff and the signal carries risk_tolerance=low. This full rollback approach prioritizes safety over speed -- it reverts to a known-good revision rather than attempting a restart with the current (potentially broken) configuration. Best for teams that require guaranteed recovery with minimal risk."
    whenNotToUse: "When the crash is caused by an external dependency failure rather than a local configuration change, when no previous healthy revision exists, or when the signal carries risk_tolerance=high. In the latter case, a simpler restart may be faster and sufficient."
    preconditions: "The deployment has at least one previous healthy revision in its rollout history."

  actionType: RollbackDeployment

  labels:
    severity: [critical, high, low]
    environment: [production, staging, "*"]
    component: "*"
    priority: "*"

  customLabels:
    risk_tolerance: "low"

  execution:
    engine: job
    bundle: quay.io/kubernaut-cicd/test-workflows/crashloop-rollback-job@sha256:0b63700b8c985e08148dedf80ee100ac8e6f32fa2acad182dfa7b7ff3d6589f2

  parameters:
    - name: TARGET_NAMESPACE
      type: string
      required: true
      description: "Namespace of the affected deployment"
    - name: TARGET_DEPLOYMENT
      type: string
      required: true
      description: "Name of the deployment to roll back"
