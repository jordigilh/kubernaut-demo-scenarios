apiVersion: v1
kind: ServiceAccount
metadata:
  name: hotfix-config-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: hotfix-config-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hotfix-config-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: hotfix-config-v1
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hotfix-config-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: hotfix-config-v1
subjects:
  - kind: ServiceAccount
    name: hotfix-config-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: hotfix-config-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: hotfix-config-v1
spec:
  version: "1.0.0"
  description:
    what: "Patches a faulty ConfigMap in-place to remove an invalid configuration directive, then performs a rolling restart to apply the fix without reverting the deployment revision"
    whenToUse: "When a deployment enters CrashLoopBackOff due to an identifiable configuration error in a mounted ConfigMap and the signal carries risk_tolerance=high. This in-place patch approach prioritizes recovery speed -- it fixes the live configuration directly rather than rolling back to a previous revision. Best for staging environments or teams that accept the risk of modifying live resources for faster recovery."
    whenNotToUse: "When risk_tolerance=low, when the configuration error cannot be identified programmatically, or when a clean rollback to a known-good revision is preferred for maximum safety. In those cases, use a full deployment rollback."
    preconditions: "The deployment mounts a ConfigMap as a volume, and the ConfigMap contains an identifiable invalid directive that can be removed to restore health."

  actionType: PatchConfiguration

  labels:
    severity: [critical, high]
    environment: [production, staging, "*"]
    component: "*"
    priority: "*"

  customLabels:
    risk_tolerance: "high"

  execution:
    engine: job
    bundle: quay.io/kubernaut-cicd/test-workflows/hotfix-config-job@sha256:8cb49998bd8a624253dcd389e5cb24ab125c07a5d7f525bf5e7c246b4f924eb3
    serviceAccountName: hotfix-config-v1-runner

  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the affected deployment"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the deployment to hotfix"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the Kubernetes resource (e.g., Deployment)"
