apiVersion: v1
kind: ServiceAccount
metadata:
  name: hotfix-config-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: hotfix-config-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hotfix-config-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: hotfix-config-v1
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hotfix-config-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: hotfix-config-v1
subjects:
  - kind: ServiceAccount
    name: hotfix-config-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: hotfix-config-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: hotfix-config-v1
  namespace: kubernaut-system
spec:
  version: "1.3.6"
  description:
    what: "Patches a faulty ConfigMap in-place to remove an invalid configuration directive, then restarts the owning Deployment so pods load the corrected configuration"
    whenToUse: "When a Deployment enters CrashLoopBackOff due to an identifiable configuration error in a mounted ConfigMap and the signal carries risk_tolerance=high. The target resource may be the ConfigMap itself or the Deployment that mounts it. Prefer this over rollback when the ConfigMap content is the root cause, because a deployment rollback only masks the problem -- the poisoned ConfigMap remains in the cluster and will re-trigger crashes if pods are rescheduled. In-place patching eliminates the root cause permanently. Best for staging environments or teams that accept the risk of modifying live resources for faster, definitive recovery."
    whenNotToUse: "When the environment is GitOps-managed (ArgoCD/Flux detected) -- an in-place patch will be overwritten by the next GitOps sync, use GitRevertCommit instead. Also do not use when risk_tolerance=low, when the configuration error cannot be identified programmatically, or when a clean rollback to a known-good revision is preferred for maximum safety."
    preconditions: "A Deployment mounts a ConfigMap as a volume, and the ConfigMap contains an identifiable invalid directive that can be removed to restore health."

  actionType: PatchConfiguration

  labels:
    severity: [critical, high]
    environment: [staging]
    component: [configmap, deployment]
    priority: "*"

  customLabels:
    risk_tolerance: "high"

  execution:
    engine: job
    serviceAccountName: hotfix-config-v1-runner
    bundle: quay.io/kubernaut-cicd/test-workflows/hotfix-config-job@sha256:b946a26a2de74cde0211375acbc0cb7bc7b820d5e2788370cda57336dd7dce4c

  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the affected resource"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the target resource (Deployment or ConfigMap, depending on RCA)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the target resource -- either Deployment or ConfigMap"
    - name: TARGET_CONFIGMAP_NAME
      type: string
      required: true
      description: "Name of the ConfigMap containing the faulty configuration (if TARGET_RESOURCE_KIND is ConfigMap, this may match TARGET_RESOURCE_NAME)"
