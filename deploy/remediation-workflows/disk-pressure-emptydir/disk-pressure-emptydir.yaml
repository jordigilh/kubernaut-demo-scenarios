apiVersion: v1
kind: ServiceAccount
metadata:
  name: migrate-emptydir-to-pvc-gitops-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: migrate-emptydir-to-pvc-gitops-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: migrate-emptydir-to-pvc-gitops-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: migrate-emptydir-to-pvc-gitops-v1
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["workflowexecutions"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: migrate-emptydir-to-pvc-gitops-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: migrate-emptydir-to-pvc-gitops-v1
subjects:
  - kind: ServiceAccount
    name: migrate-emptydir-to-pvc-gitops-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: migrate-emptydir-to-pvc-gitops-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: migrate-emptydir-to-pvc-gitops-v1
spec:
  version: "1.2.0"
  description:
    what: "Migrates a database from ephemeral emptyDir storage to a persistent volume claim via GitOps. Backs up the database via live pg_dump, commits the emptyDir-to-PVC migration to the source Git repository, waits for ArgoCD to sync the change, and restores the database to the new PVC-backed instance."
    whenToUse: "When PredictedDiskPressure or DiskPressure is caused by emptyDir growth from a stateful workload (database) running on ephemeral storage, and the namespace is managed by a GitOps tool (ArgoCD). Best used with proactive signals (BR-SP-106) where the pod is still running and backup is feasible."
    whenNotToUse: "When disk pressure is caused by ephemeral container logs, image layers, or other non-emptyDir sources. When the workload already uses PVC storage. When a simple volume expansion suffices."
    preconditions: "ArgoCD is managing the target namespace. The source Git repository is accessible. The affected pod uses an emptyDir volume for its data directory. PostgreSQL client tools (pg_dump/pg_restore) are available in the container image."

  actionType: MigrateEmptyDirToPVC

  labels:
    severity: [critical, high]
    environment: ["*"]
    component: "*"
    priority: "*"

  detectedLabels:
    gitOpsTool: "*"

  execution:
    engine: ansible
    bundle: https://github.com/jordigilh/kubernaut-test-playbooks.git
    bundleDigest: "f92b5126d44df07c19986a391651b6e4a874b0da"
    engineConfig:
      playbookPath: "playbooks/gitops-migrate-postgres-emptydir-to-pvc.yml"
      jobTemplateName: "kubernaut-migrate-emptydir-to-pvc"
    serviceAccountName: migrate-emptydir-to-pvc-gitops-v1-runner

  dependencies:
    secrets:
      - name: gitea-repo-creds

  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the affected deployment"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the deployment running on emptyDir"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the Kubernetes resource (e.g., Deployment)"
    - name: NODE_NAME
      type: string
      required: true
      description: "Name of the node reporting DiskPressure"
    - name: PVC_SIZE
      type: string
      required: false
      description: "Size for the new persistent volume claim"
      default: "10Gi"
