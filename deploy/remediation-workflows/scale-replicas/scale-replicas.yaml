apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: scale-replicas-v1-runner
rules:
- apiGroups: ["apps"]
  resources: [deployments, deployments/scale, replicasets]
  verbs: [get, list, watch, patch, update]
- apiGroups: [""]
  resources: [pods]
  verbs: [get, list, watch, delete]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: scale-replicas-v1-runner
  namespace: kubernaut-workflows
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: scale-replicas-v1-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: scale-replicas-v1-runner
subjects:
- kind: ServiceAccount
  name: scale-replicas-v1-runner
  namespace: kubernaut-workflows
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: scale-replicas-v1
  namespace: kubernaut-system
spec:
  actionType: ScaleReplicas
  labels:
    component:
    - apps/v1/Deployment
    environment:
    - production
    - staging
    priority: "*"
    severity:
    - critical
    - high
  description:
    preconditions: >
      The target Deployment exists and the issue is caused by an offending workload
      that should be isolated by scaling down, or by insufficient capacity that should
      be addressed by scaling up.
    what: >
      Scales a Deployment to a target replica count. Defaults to 0 (scale-to-zero)
      to isolate an offending workload and stop its impact on shared resources.
    whenNotToUse: >
      When the workload is a StatefulSet with persistent state that would be lost,
      or when scaling down would violate a PodDisruptionBudget.
    whenToUse: >
      When the root cause is an offending workload (e.g., connection leaker, resource
      hog) that should be stopped entirely, or when capacity needs to be increased
      by adding replicas.
  execution:
    engine: job
    serviceAccountName: scale-replicas-v1-runner
    bundle: quay.io/kubernaut-cicd/test-workflows/scale-replicas-job@sha256:a6c97cd5ee676c1d9f904e77be2ad20dc5c71bddc1172900a869c9b9a564e7f1
  parameters:
  - description: Namespace of the target Deployment
    name: TARGET_RESOURCE_NAMESPACE
    required: true
    type: string
  - description: Name of the Deployment to scale
    name: TARGET_RESOURCE_NAME
    required: true
    type: string
  - description: Must be Deployment
    name: TARGET_RESOURCE_KIND
    required: true
    type: string
  - description: Target replica count (default 0)
    name: SCALE_REPLICAS
    required: false
    type: string
  version: "1.5.1"
