apiVersion: v1
kind: ServiceAccount
metadata:
  name: helm-rollback-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: helm-rollback-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: helm-rollback-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: helm-rollback-v1
rules:
  # Helm release storage backend (secrets driver, the default)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Helm rollback re-applies the previous release manifest set
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "pods", "serviceaccounts", "persistentvolumeclaims"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: helm-rollback-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: helm-rollback-v1
subjects:
  - kind: ServiceAccount
    name: helm-rollback-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: helm-rollback-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: helm-rollback-v1
  namespace: kubernaut-system
spec:
  # Helm Rollback Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Scenario: #135 -- Helm-managed CrashLoopBackOff -> helm rollback
  version: "1.2.5"
  description:
    what: "Rolls back a Helm release to its previous revision to recover from CrashLoopBackOff caused by a bad configuration change deployed via helm upgrade"
    whenToUse: "When a Helm-managed deployment enters CrashLoopBackOff immediately after a helm upgrade, and the previous Helm revision was healthy"
    whenNotToUse: "When the workload is not managed by Helm (use RollbackDeployment instead), or when the crash is caused by an external dependency failure"
    preconditions: "The Helm release has at least one previous healthy revision in its history"
  
  actionType: HelmRollback
  
  labels:
    severity: [critical, high]
    environment: [production, staging, "*"]
    component: "*"
    priority: "*"
  
  detectedLabels:
    helmManaged: "true"
  
  execution:
    engine: job
    bundle: quay.io/kubernaut-cicd/test-workflows/helm-rollback-job@sha256:e951e0433a5f62b8a04b9f20f374ed31ca05025eff32aa5fa7a8a3764bca05ab
  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the affected deployment"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the affected Kubernetes resource (e.g., the Deployment)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the Kubernetes resource (e.g., Deployment)"
