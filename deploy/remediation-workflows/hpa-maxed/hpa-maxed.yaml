apiVersion: v1
kind: ServiceAccount
metadata:
  name: patch-hpa-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: patch-hpa-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: patch-hpa-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: patch-hpa-v1
rules:
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: patch-hpa-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: patch-hpa-v1
subjects:
  - kind: ServiceAccount
    name: patch-hpa-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: patch-hpa-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: patch-hpa-v1
  namespace: kubernaut-system
spec:
  # Patch HPA Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Scenario: #123 -- HPA at maxReplicas -> temporarily raise ceiling
  version: "1.2.4"
  description:
    what: "Temporarily increases the maxReplicas value of an HPA to allow scaling beyond the current ceiling"
    whenToUse: "When an HPA has reached its maxReplicas limit and the deployment is still under resource pressure from a legitimate traffic spike"
    whenNotToUse: "When the high CPU usage is caused by a bug (infinite loop, runaway process) rather than legitimate traffic growth"
    preconditions: "The cluster has sufficient node capacity to schedule additional pods, and the traffic spike is expected to be temporary"
  
  actionType: PatchHPA
  
  labels:
    severity: [low, medium, high, critical]
    environment: [production, staging]
    component: "*"
    priority: "*"
  
  detectedLabels:
    hpaEnabled: "true"
  
  execution:
    engine: job
    bundle: quay.io/kubernaut-cicd/test-workflows/patch-hpa-job@sha256:b9b42aff2352203cb77babc5e451792b7ae14d45e914585b792e5844c6458db5
  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the HPA"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the HPA to patch"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the Kubernetes resource (e.g., HorizontalPodAutoscaler)"
    - name: NEW_MAX_REPLICAS
      type: integer
      required: false
      description: "New maxReplicas value (default: current + 2)"
