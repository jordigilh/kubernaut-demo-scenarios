apiVersion: v1
kind: ServiceAccount
metadata:
  name: remove-taint-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: remove-taint-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: remove-taint-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: remove-taint-v1
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: remove-taint-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: remove-taint-v1
subjects:
  - kind: ServiceAccount
    name: remove-taint-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: remove-taint-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: remove-taint-v1
spec:
  # Remove Taint Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Scenario: #122 -- Pods pending due to node taint -> remove taint
  version: "1.2.0"
  description:
    what: "Removes a specific taint from a Kubernetes node to unblock pod scheduling"
    whenToUse: "When pods are stuck in Pending state because a node has a taint that blocks scheduling, and the taint is no longer needed (e.g., maintenance window ended)"
    whenNotToUse: "When the taint is intentional (e.g., node is genuinely under maintenance or has a hardware issue)"
    preconditions: "The node is otherwise healthy and the taint is the sole reason pods are unschedulable"
  
  actionType: RemoveTaint
  
  labels:
    severity: [low, medium, high, critical]
    environment: [production, staging, "*"]
    component: "*"
    priority: "*"
  
  execution:
    engine: job
    bundle: quay.io/kubernaut-cicd/test-workflows/remove-taint-job@sha256:5bdd9aa5e4b424157f6b3db49b3fe0c106e3e789b700ef39efacbb395bc8adf8
    serviceAccountName: remove-taint-v1-runner
  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: false
      description: "Namespace with affected pending pods (used for verification)"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the node with the taint to remove"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the Kubernetes resource (e.g., Node)"
    - name: TAINT_KEY
      type: string
      required: true
      description: "Key of the taint to remove (e.g., 'maintenance')"
