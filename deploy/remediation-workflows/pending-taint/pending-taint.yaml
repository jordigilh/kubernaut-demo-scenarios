apiVersion: v1
kind: ServiceAccount
metadata:
  name: remove-taint-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: remove-taint-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: remove-taint-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: remove-taint-v1
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: remove-taint-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: remove-taint-v1
subjects:
  - kind: ServiceAccount
    name: remove-taint-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: remove-taint-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: remove-taint-v1
  namespace: kubernaut-system
spec:
  # Remove Taint Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Scenario: #122 -- Pods pending due to node taint -> remove taint
  version: "1.3.3"
  description:
    what: "Removes a specific taint from a Kubernetes node to unblock pod scheduling"
    whenToUse: "When pods are stuck in Pending state because a node has a taint that blocks scheduling, and the taint is no longer needed (e.g., maintenance window ended). Supply the node name in NODE_NAME and the taint key in TAINT_KEY."
    whenNotToUse: "When the taint is intentional (e.g., node is genuinely under maintenance or has a hardware issue)"
    preconditions: "The node is otherwise healthy and the taint is the sole reason pods are unschedulable"
  
  actionType: RemoveTaint
  
  labels:
    severity: [low, medium, high, critical]
    environment: [staging]
    component: [node, deployment]
    priority: "*"
  
  execution:
    engine: job
    serviceAccountName: remove-taint-v1-runner
    bundle: quay.io/kubernaut-cicd/test-workflows/remove-taint-job@sha256:28e1aeace7b4f0fbb630bdd0b1cb22c196f87c303757f6d5f3269427d3d51628
  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: false
      description: "Namespace of the affected workload (auto-filled by KA from the RCA target)"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the affected Deployment (RCA target; use NODE_NAME for the tainted node)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Must be Deployment (the affected workload, not the Node)"
    - name: TAINT_KEY
      type: string
      required: true
      description: "Key of the taint to remove from the node (e.g., 'maintenance')"
    - name: NODE_NAME
      type: string
      required: true
      description: "Name of the Kubernetes node that has the taint to remove (e.g., 'worker-node-1'). The LLM must identify this from the RCA."
