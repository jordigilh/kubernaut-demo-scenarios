apiVersion: v1
kind: ServiceAccount
metadata:
  name: cleanup-pvc-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: cleanup-pvc-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cleanup-pvc-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: cleanup-pvc-v1
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cleanup-pvc-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: cleanup-pvc-v1
subjects:
  - kind: ServiceAccount
    name: cleanup-pvc-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: cleanup-pvc-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: cleanup-pvc-v1
  namespace: kubernaut-system
spec:
  # Cleanup PVC Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Scenario: #121 -- Orphaned PVCs consuming disk -> cleanup
  version: "1.3.2"
  description:
    what: "Deletes orphaned PersistentVolumeClaims that are not mounted by any running pod"
    whenToUse: "When PVCs from completed or failed batch jobs accumulate and contribute to storage pressure"
    whenNotToUse: "When PVCs are in use by running workloads, or when the data in the PVCs needs to be preserved for compliance"
    preconditions: "The PVCs are confirmed orphaned (not mounted by any running pod) and the data does not need to be retained"
  
  actionType: CleanupPVC
  
  labels:
    severity: [low, medium, critical]
    environment: [production, staging]
    component: [persistentvolumeclaim]
    priority: "*"
  
  execution:
    engine: job
    serviceAccountName: cleanup-pvc-v1-runner
    bundle: quay.io/kubernaut-cicd/test-workflows/cleanup-pvc-job@sha256:ffefd3e891e9034c0ecbccf65318d32b2db62644272472484049711fedd527da
  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace containing the orphaned PVCs"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Must be PersistentVolumeClaim"
    - name: LABEL_SELECTOR
      type: string
      required: false
      description: "Label selector to identify PVCs to clean up (default: batch-run=completed)"
