apiVersion: v1
kind: ServiceAccount
metadata:
  name: proactive-rollback-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: proactive-rollback-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: proactive-rollback-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: proactive-rollback-v1
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: proactive-rollback-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: proactive-rollback-v1
subjects:
  - kind: ServiceAccount
    name: proactive-rollback-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: proactive-rollback-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: proactive-rollback-v1
spec:
  # Proactive Rollback Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Scenario: #128 -- SLO error budget burn -> proactive rollback
  version: "1.2.2"
  description:
    what: "Proactively rolls back a deployment based on SLO error budget burn rate analysis"
    whenToUse: "When the current error rate will exhaust the SLO error budget before the next maintenance window, and a recent deployment revision is the likely cause"
    whenNotToUse: "When the error rate is within normal bounds, or the issue is caused by an external dependency rather than a deployment change"
    preconditions: "A previous stable deployment revision exists, and the error spike correlates with a recent deployment change"
  
  actionType: ProactiveRollback
  
  labels:
    severity: [critical, high]
    environment: [production, staging, "*"]
    component: "*"
    priority: "*"
  
  execution:
    engine: job
    bundle: quay.io/kubernaut-cicd/test-workflows/proactive-rollback-job@sha256:fcce381a54bc96ed23c7689505cb23e7dc3e053c6a6e74e12ca7907503607289
  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the affected deployment"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the deployment to roll back"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the Kubernetes resource (e.g., Deployment)"
