apiVersion: v1
kind: ServiceAccount
metadata:
  name: graceful-restart-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: graceful-restart-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: graceful-restart-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: graceful-restart-v1
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: graceful-restart-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: graceful-restart-v1
subjects:
  - kind: ServiceAccount
    name: graceful-restart-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: graceful-restart-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: graceful-restart-v1
  namespace: kubernaut-system
spec:
  # Graceful Restart Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Scenario: #129 -- Proactive memory exhaustion -> graceful restart
  version: "1.4.1"
  description:
    what: "Performs a zero-downtime rolling restart of a deployment to reset container runtime state, reclaiming memory consumed by leaks or unbounded allocations before the kubelet OOMKills the container"
    whenToUse: "When a container's memory usage is growing monotonically toward its limit — indicating a memory leak, unbounded cache, or resource accumulation — and a pod restart will reset the process memory without data loss. This is the standard production first-response for predicted OOM: preserve service availability now while the development team addresses the underlying defect in the next release cycle"
    whenNotToUse: "When memory growth is from legitimate workload activity (cache warming, batch data loading, JVM heap expansion) that will plateau below the limit, or when the process holds critical in-memory state that cannot be recovered after restart"
    preconditions: "The deployment uses a rolling update strategy, the PodDisruptionBudget (if any) permits pod cycling, and the application is stateless or persists its state externally"
  
  actionType: GracefulRestart
  
  labels:
    severity: [low, medium, high, critical]
    environment: [production, staging]
    component: [deployment]
    priority: "*"
  
  execution:
    engine: job
    serviceAccountName: graceful-restart-v1-runner
    bundle: quay.io/kubernaut-cicd/test-workflows/graceful-restart-job@sha256:ca133cd8cc0075896225c3daff16cee8446b724f330dcbb3fb9414254f7399b0
  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the affected deployment"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the deployment to restart"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Must be Deployment"
