apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: graceful-restart-v1
spec:
  # Graceful Restart Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Scenario: #129 -- Proactive memory exhaustion -> graceful restart
  version: "1.0.1"
  description:
    what: "Performs a graceful rolling restart of a deployment to reset its runtime state and reclaim leaked memory"
    whenToUse: "When proactive analysis indicates a container is trending toward OOM based on memory growth rate, and a restart will reset the leak without data loss"
    whenNotToUse: "When the memory growth is from legitimate workload (cache warming, data loading) rather than a leak, or when the application cannot tolerate restarts"
    preconditions: "The deployment supports rolling restarts without data loss, and the memory growth pattern is confirmed as a leak (linear, unbounded)"
  
  actionType: GracefulRestart
  
  labels:
    severity: [low, medium, high, critical]
    environment: [production, staging]
    component: "*"
    priority: "*"
  
  execution:
    engine: job
    bundle: quay.io/kubernaut-cicd/test-workflows/graceful-restart-job@sha256:af7bc19c255bb02e8e38263df5ef7e114ec31642e2aba9a9792bd4d5235170ca
  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the affected deployment"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the deployment to restart"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the Kubernetes resource (e.g., Deployment)"
