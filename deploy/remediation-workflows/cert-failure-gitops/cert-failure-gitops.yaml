apiVersion: v1
kind: ServiceAccount
metadata:
  name: fix-certificate-gitops-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: fix-certificate-gitops-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fix-certificate-gitops-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: fix-certificate-gitops-v1
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fix-certificate-gitops-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: fix-certificate-gitops-v1
subjects:
  - kind: ServiceAccount
    name: fix-certificate-gitops-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: fix-certificate-gitops-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: fix-certificate-gitops-v1
spec:
  # Fix Certificate (GitOps) Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Scenario: #134 -- GitOps-managed Certificate failure -> git revert
  version: "1.2.3"
  description:
    what: "Reverts a bad Git commit that broke a cert-manager ClusterIssuer in a GitOps-managed environment"
    whenToUse: "When a GitOps-managed cert-manager Certificate is stuck NotReady because a recent Git commit changed the ClusterIssuer to reference a non-existent CA Secret"
    whenNotToUse: "When the environment is not GitOps-managed (use fix-certificate-v1 instead for direct kubectl remediation)"
    preconditions: "ArgoCD is active, the Gitea repository is accessible, and a previous healthy commit exists with the correct ClusterIssuer configuration"
  
  actionType: GitRevertCommit
  
  labels:
    severity: [critical, high]
    environment: ["*"]
    component: "*"
    priority: "*"
  
  detectedLabels:
    gitOpsTool: "*"
  
  execution:
    engine: job
    bundle: quay.io/kubernaut-cicd/test-workflows/fix-certificate-gitops-job@sha256:b8a84337dbcf1a2055c76e1a16b47460a9751fbc5b3b0f849bd6ac4565b19e2e
    serviceAccountName: fix-certificate-gitops-v1-runner

  dependencies:
    secrets:
      - name: gitea-repo-creds

  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the affected Certificate"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the affected Certificate (for verification)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the Kubernetes resource (e.g., Certificate)"
