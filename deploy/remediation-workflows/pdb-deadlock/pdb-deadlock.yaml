apiVersion: v1
kind: ServiceAccount
metadata:
  name: relax-pdb-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: relax-pdb-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: relax-pdb-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: relax-pdb-v1
rules:
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: relax-pdb-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: relax-pdb-v1
subjects:
  - kind: ServiceAccount
    name: relax-pdb-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: relax-pdb-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: relax-pdb-v1
spec:
  # Relax PDB Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Scenario: #124 -- PDB deadlock -> temporarily relax PDB
  version: "1.2.1"
  description:
    what: "Temporarily relaxes a PodDisruptionBudget by reducing minAvailable to allow voluntary disruptions to proceed"
    whenToUse: "When a PDB is blocking rolling updates or node drains because minAvailable equals the replica count, leaving zero allowed disruptions"
    whenNotToUse: "When pods are genuinely unhealthy and the PDB is correctly protecting against further disruption during an outage"
    preconditions: "All pods matching the PDB selector are healthy, and the blocking is caused by an overly conservative minAvailable setting rather than actual instability"
  
  actionType: RelaxPDB
  
  labels:
    severity: [low, medium, high, critical]
    environment: [production, staging]
    component: "*"
    priority: "*"
  
  detectedLabels:
    pdbProtected: "true"
  
  execution:
    engine: job
    bundle: quay.io/kubernaut-cicd/test-workflows/relax-pdb-job@sha256:70341126a798429ab40bac5ba877326a2ca9d26e2e4d25a0b1847a2bba43b14f
    serviceAccountName: relax-pdb-v1-runner
  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the PDB"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the PDB to relax"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the Kubernetes resource (e.g., PodDisruptionBudget)"
