apiVersion: v1
kind: ServiceAccount
metadata:
  name: git-revert-v2-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: git-revert-v2
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: git-revert-v2-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: git-revert-v2
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: git-revert-v2-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: git-revert-v2
subjects:
  - kind: ServiceAccount
    name: git-revert-v2-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: git-revert-v2-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: git-revert-v2
  namespace: kubernaut-system
spec:
  # GitOps Revert Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Scenario: #125 -- GitOps drift remediation (ArgoCD + Gitea)
  version: "1.3.1"
  description:
    what: "Reverts the most recent commit in a GitOps-managed repository to undo a bad change"
    whenToUse: "When a GitOps-managed workload is crashing due to a bad commit (ConfigMap, Deployment spec, etc.) and ArgoCD/Flux will reconcile the reverted state. ALWAYS prefer this over PatchConfiguration or RollbackDeployment when the environment is GitOps-managed (detected label gitOpsTool is set), because in-place patches or kubectl rollbacks will be overwritten by the next ArgoCD/Flux sync -- only a git revert permanently fixes the root cause in the source of truth."
    whenNotToUse: "When the environment is not GitOps-managed (no ArgoCD/Flux annotations detected) -- use RollbackDeployment or PatchConfiguration instead"
    preconditions: "ArgoCD or Flux is active, the Gitea/GitHub repository is accessible, and a previous healthy commit exists"
  
  actionType: GitRevertCommit
  
  labels:
    severity: [critical, high]
    environment: [staging]
    component: [configmap, deployment]
    priority: "*"
  
  detectedLabels:
    gitOpsTool: "*"
  
  execution:
    engine: job
    serviceAccountName: git-revert-v2-runner
    bundle: quay.io/kubernaut-cicd/test-workflows/git-revert-job@sha256:62aecf8175eaba04dddd1dfd270809b80ecf56c1a1df67783cd0a91d1e67767b

  dependencies:
    secrets:
      - name: gitea-repo-creds

  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the affected workload"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the Deployment (for verification)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Must be Deployment"
