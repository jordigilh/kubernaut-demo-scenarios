apiVersion: v1
kind: ServiceAccount
metadata:
  name: expand-pvc-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: expand-pvc-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: expand-pvc-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: expand-pvc-v1
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: expand-pvc-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: expand-pvc-v1
subjects:
  - kind: ServiceAccount
    name: expand-pvc-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: expand-pvc-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: expand-pvc-v1
  namespace: kubernaut-system
spec:
  version: "1.4.1"
  description:
    what: "Expands a PersistentVolumeClaim to increase its storage capacity, preventing data loss from disk exhaustion"
    whenToUse: "When proactive analysis predicts PVC exhaustion based on storage growth trends, and the StorageClass supports volume expansion"
    whenNotToUse: "When disk growth is from stale data that should be cleaned rather than accommodated, or when the StorageClass does not support expansion"
    preconditions: "The PVC's StorageClass has allowVolumeExpansion: true, and the CSI driver supports online resize"

  actionType: ExpandPersistentVolumeClaim

  labels:
    severity: [low, medium, high, critical]
    environment: [production, staging]
    component: [persistentvolumeclaim, statefulset, deployment]
    priority: "*"

  execution:
    engine: job
    serviceAccountName: expand-pvc-v1-runner
    bundle: quay.io/kubernaut-cicd/test-workflows/expand-pvc-job@sha256:ae249f5ccd0573d0a26bd3c21b793fbbe4d07453be991e92cce08205cc2b6857
  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the PVC to expand"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the PVC to expand"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Must be PersistentVolumeClaim"
