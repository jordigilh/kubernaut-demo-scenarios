apiVersion: v1
kind: ServiceAccount
metadata:
  name: fix-certificate-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: fix-certificate-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fix-certificate-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: fix-certificate-v1
rules:
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list"]
  - apiGroups: ["cert-manager.io"]
    resources: ["clusterissuers"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fix-certificate-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: fix-certificate-v1
subjects:
  - kind: ServiceAccount
    name: fix-certificate-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: fix-certificate-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: fix-certificate-v1
spec:
  # Fix Certificate Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Scenario: #133 -- cert-manager Certificate NotReady -> recreate CA Secret
  version: "1.0.9"
  description:
    what: "Recreates the CA Secret backing a cert-manager ClusterIssuer to restore certificate issuance"
    whenToUse: "When a cert-manager Certificate is stuck in NotReady because the CA Secret has been deleted or corrupted"
    whenNotToUse: "When the Certificate failure is caused by DNS validation issues or incorrect certificate spec rather than a missing CA"
    preconditions: "cert-manager is installed and the ClusterIssuer exists but cannot sign due to a missing or corrupted CA Secret"
  
  actionType: FixCertificate
  
  labels:
    severity: [critical, high]
    environment: [production, staging, "*"]
    component: "*"
    priority: "*"
  
  execution:
    engine: job
    bundle: quay.io/kubernaut-cicd/test-workflows/fix-certificate-job@sha256:ffcd8ae71052f6dee2ce2a6a71ec2f1af18828fe037fef618b893334ce8b3c75
    serviceAccountName: fix-certificate-v1-runner
  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the affected workload and Certificate"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the affected Kubernetes resource (e.g., the Deployment)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the affected Kubernetes resource (e.g., Deployment)"
    - name: CERTIFICATE_NAME
      type: string
      required: true
      description: "Name of the cert-manager Certificate to fix"
    - name: ISSUER_NAME
      type: string
      required: true
      description: "Name of the ClusterIssuer backing the certificate"
    - name: CA_SECRET_NAME
      type: string
      required: true
      description: "Name of the CA Secret to recreate"
    - name: CA_SECRET_NAMESPACE
      type: string
      required: false
      description: "Namespace of the CA Secret"
      default: "cert-manager"
