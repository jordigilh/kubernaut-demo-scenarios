apiVersion: v1
kind: ServiceAccount
metadata:
  name: fix-certificate-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: fix-certificate-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fix-certificate-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: fix-certificate-v1
rules:
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list"]
  - apiGroups: ["cert-manager.io"]
    resources: ["clusterissuers"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fix-certificate-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: fix-certificate-v1
subjects:
  - kind: ServiceAccount
    name: fix-certificate-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: fix-certificate-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: fix-certificate-v1
  namespace: kubernaut-system
spec:
  # Fix Certificate Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Scenario: #133 -- cert-manager Certificate NotReady -> recreate CA Secret
  version: "1.3.1"
  description:
    what: "Recreates the CA Secret backing a cert-manager ClusterIssuer to restore certificate issuance"
    whenToUse: "When a cert-manager Certificate is stuck in NotReady because the CA Secret has been deleted or corrupted. Supply the issuer name in ISSUER_NAME and issuer kind in ISSUER_KIND so the job can locate the CA Secret."
    whenNotToUse: "When the Certificate failure is caused by DNS validation issues or incorrect certificate spec rather than a missing CA"
    preconditions: "cert-manager is installed and the ClusterIssuer exists but cannot sign due to a missing or corrupted CA Secret"
  
  actionType: FixCertificate
  
  labels:
    severity: [critical, high]
    environment: [production, staging, "*"]
    component: "*"
    priority: "*"
  
  execution:
    engine: job
    serviceAccountName: fix-certificate-v1-runner
    bundle: quay.io/kubernaut-cicd/test-workflows/fix-certificate-job@sha256:c0226534b66468bcc913d9785599995ebde4ae65e199c22f3b053c159098b1c9
  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the affected workload (auto-filled by KA from the RCA target)"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the affected workload (auto-filled by KA, e.g., the Deployment name)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the affected workload (auto-filled by KA, e.g., Deployment)"
    - name: ISSUER_NAME
      type: string
      required: true
      description: "Name of the cert-manager issuer whose CA Secret needs regeneration (e.g., 'demo-selfsigned-ca'). The LLM must identify this from the RCA."
    - name: ISSUER_KIND
      type: string
      required: false
      description: "Kind of the issuer — 'ClusterIssuer' or 'Issuer' (defaults to ClusterIssuer)"
      default: "ClusterIssuer"
    - name: CA_SECRET_NAMESPACE
      type: string
      required: false
      description: "Namespace where the CA Secret lives (defaults to cert-manager)"
      default: "cert-manager"
