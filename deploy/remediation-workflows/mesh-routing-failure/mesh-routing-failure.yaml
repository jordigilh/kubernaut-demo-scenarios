apiVersion: v1
kind: ServiceAccount
metadata:
  name: fix-authz-policy-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: fix-authz-policy-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fix-authz-policy-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: fix-authz-policy-v1
rules:
  - apiGroups: ["security.istio.io"]
    resources: ["authorizationpolicies"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fix-authz-policy-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: fix-authz-policy-v1
subjects:
  - kind: ServiceAccount
    name: fix-authz-policy-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: fix-authz-policy-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: fix-authz-policy-v1
spec:
  # Fix AuthorizationPolicy Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Scenario: #136 -- Istio AuthorizationPolicy blocks traffic -> remove/fix policy
  version: "1.2.3"
  description:
    what: "Removes or fixes an Istio AuthorizationPolicy that is blocking legitimate traffic"
    whenToUse: "When a meshed workload has high error rates (403s) due to a restrictive AuthorizationPolicy"
    whenNotToUse: "When the 403 errors are intentional (security policy) or caused by something other than an AuthorizationPolicy"
    preconditions: "Istio is installed, the workload is meshed, and an AuthorizationPolicy is identified as the traffic blocker"
  
  actionType: FixAuthorizationPolicy
  
  labels:
    severity: [critical, high]
    environment: ["*"]
    component: "*"
    priority: "*"
  
  detectedLabels:
    serviceMesh: "*"
  
  execution:
    engine: job
    bundle: quay.io/kubernaut-cicd/test-workflows/fix-authz-policy-job@sha256:88d92e2c6741c7b2d8ff57f7bcf02da692d468bf9d4467aac827e689e4c8eea7
    serviceAccountName: fix-authz-policy-v1-runner
  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the affected workload"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the AuthorizationPolicy to remove"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the Kubernetes resource (e.g., AuthorizationPolicy)"
