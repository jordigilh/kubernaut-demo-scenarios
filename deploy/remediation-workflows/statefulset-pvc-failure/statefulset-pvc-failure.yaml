apiVersion: v1
kind: ServiceAccount
metadata:
  name: fix-statefulset-pvc-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: fix-statefulset-pvc-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fix-statefulset-pvc-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: fix-statefulset-pvc-v1
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fix-statefulset-pvc-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: fix-statefulset-pvc-v1
subjects:
  - kind: ServiceAccount
    name: fix-statefulset-pvc-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: fix-statefulset-pvc-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: fix-statefulset-pvc-v1
  namespace: kubernaut-system
spec:
  # Fix StatefulSet PVC Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Scenario: #137 -- StatefulSet PVC deleted -> pod stuck Pending -> recreate PVC
  version: "1.3.6"
  description:
    what: "Recreates a missing PVC for a StatefulSet to allow the stuck pod to be scheduled"
    whenToUse: "When a StatefulSet pod is stuck in Pending because its PVC has been deleted or is unbound"
    whenNotToUse: "When the PVC exists but the storage backend is down (fix the storage backend instead)"
    preconditions: "The StatefulSet exists with a volumeClaimTemplate, and the missing PVC name follows the StatefulSet naming convention"
  
  actionType: FixStatefulSetPVC
  
  labels:
    severity: [critical, high]
    environment: [production, staging]
    component: [statefulset, persistentvolumeclaim]
    priority: "*"
  
  detectedLabels:
    stateful: "true"
  
  execution:
    engine: job
    serviceAccountName: fix-statefulset-pvc-v1-runner
    bundle: quay.io/kubernaut-cicd/test-workflows/fix-statefulset-pvc-job@sha256:34f9986f4ace11e0fd9e763173ba8fed632b00a015865744269ef9454ad4b041
  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: false
      description: "Namespace of the StatefulSet. Discovered automatically when not provided."
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the StatefulSet"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Must be StatefulSet"
    - name: TARGET_PVC
      type: string
      required: false
      description: "Name of the missing PVC (auto-detected if not provided)"
