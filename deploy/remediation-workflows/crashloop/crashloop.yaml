apiVersion: v1
kind: ServiceAccount
metadata:
  name: crashloop-rollback-v1-runner
  namespace: kubernaut-workflows
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: crashloop-rollback-v1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crashloop-rollback-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: crashloop-rollback-v1
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crashloop-rollback-v1-runner
  labels:
    kubernaut.ai/workflow-runner: "true"
    kubernaut.ai/workflow: crashloop-rollback-v1
subjects:
  - kind: ServiceAccount
    name: crashloop-rollback-v1-runner
    namespace: kubernaut-workflows
roleRef:
  kind: ClusterRole
  name: crashloop-rollback-v1-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: crashloop-rollback-v1
  namespace: kubernaut-system
spec:
  # Rollback Deployment Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Scenario: #120 -- CrashLoopBackOff -> rollback to working config
  version: "1.3.3"
  description:
    what: "Rolls back a deployment to its previous revision to recover from CrashLoopBackOff caused by a bad configuration change"
    whenToUse: "When a deployment enters CrashLoopBackOff immediately after a config or image change, and the previous revision was healthy"
    whenNotToUse: "When the root cause analysis identifies a ConfigMap as the target resource -- rolling back a Deployment does not modify the ConfigMap, so the EA pre/post hash check on the ConfigMap would show no change and the remediation would be flagged as ineffective. Also do not use when the crash is caused by an external dependency failure (database down, network partition) rather than a local configuration change."
    preconditions: "The deployment has at least one previous healthy revision in its rollout history. The RCA target must be a Deployment, not a ConfigMap."
  
  actionType: RollbackDeployment
  
  labels:
    severity: [critical, low]
    environment: [production]
    component: [deployment]
    priority: "*"
  
  execution:
    engine: job
    serviceAccountName: crashloop-rollback-v1-runner
    bundle: quay.io/kubernaut-cicd/test-workflows/crashloop-rollback-job@sha256:35f08c06882da01e7ee1b30dd43742ff24c47b3a53467853c3499c06a22b2b5e
  parameters:
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the affected deployment"
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the deployment to roll back"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Must be Deployment"
