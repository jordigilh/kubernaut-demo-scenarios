      PVC_SIZE: 10Gi
      TARGET_RESOURCE_API_VERSION: apps/v1
      TARGET_RESOURCE_KIND: Deployment
      TARGET_RESOURCE_NAME: postgres-emptydir
      TARGET_RESOURCE_NAMESPACE: demo-diskpressure
    rationale: 'This workflow is purpose-built for exactly this scenario: DiskPressure
      caused by a PostgreSQL database using emptyDir storage on a GitOps-managed (ArgoCD)
      namespace. It performs a live pg_dump backup of the running PostgreSQL instance,
      commits the emptyDir-to-PVC volume change to the source Git repository, waits
      for ArgoCD to sync, then restores the data — preventing both data loss and the
      ArgoCD revert risk. LVMS/TopoLVM is confirmed available on this cluster. This
      is a proactive signal (pod still running), which is the ideal condition for
      this workflow''s backup phase. The non-database variant (migrate-emptydir-to-pvc-gitops-v1)
      is explicitly excluded by its own whenNotToUse guidance for database workloads.'
