  reason: AnalysisCompleted
  rootCause: PostgreSQL Deployment uses an emptyDir volume with sizeLimit:8Gi on node
    dev-worker-0 which has only ~7.9 GiB allocatable ephemeral storage. As PostgreSQL
    writes WAL segments, data pages, and log files, the kubelet will trigger pod eviction
    before the declared sizeLimit is reached, causing an imminent DiskPressure condition.
    The node's /var filesystem (XFS, /dev/vda4) already shows a ~1.7 GiB drop in 30
    minutes around deployment time. The fix requires migrating from emptyDir to a
    PersistentVolumeClaim (LVMS/TopoLVM available), and since ArgoCD manages this
    Deployment, the change must be applied via GitOps.
  rootCauseAnalysis:
    contributingFactors:
    - Node dev-worker-0 has severely constrained allocatable ephemeral storage (~7.9
      GiB) compared to other workers (~56 GiB), likely due to a smaller root partition
      or LVM configuration
    - emptyDir sizeLimit of 8Gi exceeds the node's allocatable ephemeral storage of
      ~7.9 GiB — kubelet will trigger eviction before the sizeLimit is reached
    - Node /var filesystem (XFS, /dev/vda4) dropped ~1.7 GiB in ~30 minutes around
      02:00Z on 2026-05-10, indicating active disk pressure growth
    - PostgreSQL WAL segments, data pages, and log files will grow steadily in the
      emptyDir volume at /var/lib/pgsql/data/userdata
    - ArgoCD is managing this Deployment (argocd tracking annotation present), meaning
      manual fixes may be reverted unless the GitOps source is updated
    - Pod had 1 restart due to a race condition on role creation — each restart resets
      disk usage but also risks data loss on emptyDir wipe
    - The workflow container in sonataflow-infra adds background pressure (~165 MB,
      growing ~127 KB/30min) on the same /dev/vda4 device
    remediationTarget:
      kind: Deployment
      name: postgres-emptydir
      namespace: demo-diskpressure
    severity: high
