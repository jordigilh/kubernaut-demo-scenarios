apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-worker
  namespace: demo-memory-escalation
  labels:
    app: ml-worker
    kubernaut.ai/managed: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-worker
  template:
    metadata:
      labels:
        app: ml-worker
    spec:
      containers:
      - name: ml-worker
        image: registry.k8s.io/e2e-test-images/busybox:1.29-2
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "ml-worker: simulating memory leak (8Mi every 1s)"
          i=0
          while true; do
            dd if=/dev/urandom of=/dev/shm/leak_$i bs=1048576 count=8 2>/dev/null
            i=$((i + 1))
            sleep 1
          done
        volumeMounts:
        - name: shm
          mountPath: /dev/shm
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
      volumes:
      - name: shm
        emptyDir:
          medium: Memory
---
apiVersion: v1
kind: Service
metadata:
  name: ml-worker
  namespace: demo-memory-escalation
  labels:
    app: ml-worker
spec:
  selector:
    app: ml-worker
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
