apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-ml-pipeline
  labels:
    release: prometheus
spec:
  groups:
  - name: demo-app
    rules:
    - alert: ContainerOOMKilling
      expr: |
        kube_pod_container_status_last_terminated_reason{
          namespace="demo-ml-pipeline",
          reason="OOMKilled"
        } > 0
      for: 10s
      labels:
        severity: critical
      annotations:
        summary: >
          Container {{ $labels.container }} in pod {{ $labels.pod }}
          is not running stably.
        description: >
          A container in namespace {{ $labels.namespace }} has been terminated
          unexpectedly. Service availability may be degraded.
