apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kubernaut-memory-rules
  namespace: demo-memory-escalation
  labels:
    release: prometheus
spec:
  groups:
  - name: kubernaut-memory-escalation
    rules:
    - alert: ContainerOOMKilling
      expr: |
        kube_pod_container_status_last_terminated_reason{
          namespace="demo-memory-escalation",
          reason="OOMKilled"
        } > 0
      for: 10s
      labels:
        severity: critical
      annotations:
        summary: >
          Container {{ $labels.container }} in pod {{ $labels.pod }} was OOMKilled
          in the last 5 minutes.
        description: >
          Container {{ $labels.container }} in pod {{ $labels.pod }} (namespace
          {{ $labels.namespace }}) was terminated by the kernel OOM killer
          because it exceeded its memory limit. The container will be restarted
          by the kubelet, but if the memory pressure persists, repeated OOMKill
          events are expected.
