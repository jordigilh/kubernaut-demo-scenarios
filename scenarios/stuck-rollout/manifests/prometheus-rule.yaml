apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kubernaut-stuck-rollout-rules
  namespace: demo-rollout
  labels:
    release: prometheus
spec:
  groups:
  - name: kubernaut-stuck-rollout
    rules:
    # Detect deployment rollout stuck (not progressing)
    # kube-state-metrics exposes a "Progressing" condition with status "false"
    # when the deployment exceeds its progressDeadlineSeconds
    - alert: KubeDeploymentRolloutStuck
      expr: |
        kube_deployment_status_condition{
          namespace="demo-rollout",
          deployment="checkout-api",
          condition="Progressing",
          status="false"
        } == 1
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: >
          Deployment {{ $labels.deployment }} in namespace {{ $labels.namespace }}
          has a stuck rollout -- not progressing for over 2 minutes.
        description: >
          Deployment {{ $labels.deployment }} in namespace {{ $labels.namespace }}
          has exceeded its progressDeadlineSeconds and is no longer making progress
          on its rollout. New ReplicaSet pods are unable to reach Ready state.
          Common causes include invalid container images, missing ConfigMaps or
          Secrets, failing readiness probes, or insufficient cluster resources.
