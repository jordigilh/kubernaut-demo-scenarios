apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-shipping
  labels:
    release: prometheus
spec:
  groups:
  - name: demo-app
    rules:
    # Detect deployment rollout stuck (not progressing)
    # kube-state-metrics exposes a "Progressing" condition with status "false"
    # when the deployment exceeds its progressDeadlineSeconds
    - alert: KubeDeploymentRolloutStuck
      expr: |
        kube_deployment_status_condition{
          namespace="demo-shipping",
          deployment="checkout-api",
          condition="Progressing",
          status="false"
        } == 1
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: >
          Deployment {{ $labels.deployment }} in namespace {{ $labels.namespace }}
          rollout is not progressing.
        description: >
          A deployment rollout in namespace {{ $labels.namespace }} has stalled.
          New pods are not reaching Ready state.
