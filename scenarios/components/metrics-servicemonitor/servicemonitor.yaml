apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: demo-app-metrics
  labels:
    release: kube-prometheus-stack
    app.kubernetes.io/managed-by: kubernaut-demo-scenarios
spec:
  selector:
    matchLabels:
      kubernaut.ai/metrics: "true"
  endpoints:
    - port: http
      interval: 10s
      path: /metrics
