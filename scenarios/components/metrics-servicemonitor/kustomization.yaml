apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - servicemonitor.yaml
replacements:
  - source:
      kind: Namespace
      fieldPath: metadata.name
    targets:
      - select:
          kind: ServiceMonitor
          name: demo-app-metrics
        fieldPaths:
          - metadata.namespace
        options:
          create: true
