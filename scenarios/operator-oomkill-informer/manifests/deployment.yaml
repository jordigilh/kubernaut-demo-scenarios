apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-controllers-controller
  namespace: demo-controllers
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: demo-controllers-controller
  namespace: demo-controllers
rules:
- apiGroups: [""]
  resources: [configmaps]
  verbs: [get, list, watch]
- apiGroups: [""]
  resources: [pods]
  verbs: [get, list, watch]
- apiGroups: [""]
  resources: [events]
  verbs: [create, patch]
- apiGroups: [coordination.k8s.io]
  resources: [leases]
  verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-controllers-controller
  namespace: demo-controllers
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: demo-controllers-controller
subjects:
- kind: ServiceAccount
  name: demo-controllers-controller
  namespace: demo-controllers
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-controllers-controller
  namespace: demo-controllers
  labels:
    app: demo-controllers-controller
    kubernaut.ai/managed: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-controllers-controller
  template:
    metadata:
      labels:
        app: demo-controllers-controller
    spec:
      serviceAccountName: demo-controllers-controller
      containers:
      - name: manager
        image: quay.io/kubernaut-cicd/demo-operator:1.0.3
        imagePullPolicy: Always
        env:
        - name: WATCH_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        ports:
        - containerPort: 8081
          name: health
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 3
          periodSeconds: 5
