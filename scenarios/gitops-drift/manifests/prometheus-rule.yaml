apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kubernaut-gitops-drift-rules
  namespace: demo-gitops
  labels:
    release: kube-prometheus-stack
spec:
  groups:
  - name: gitops-drift-alerts
    rules:
    - alert: KubePodCrashLooping
      expr: |
        increase(
          kube_pod_container_status_restarts_total{
            namespace="demo-gitops",
            container="web-frontend"
          }[5m]
        ) > 2
      for: 30s
      labels:
        severity: critical
        scenario: gitops-drift
      annotations:
        summary: >
          Pod {{ $labels.pod }} is crash looping in demo-gitops.
        description: >
          Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is restarting
          repeatedly. The namespace is managed by ArgoCD (GitOps). Recent
          commits to the Git repository may have introduced a configuration
          change that causes the application to fail on startup.
        runbook_url: "https://kubernaut.ai/runbooks/crashloop-gitops"
