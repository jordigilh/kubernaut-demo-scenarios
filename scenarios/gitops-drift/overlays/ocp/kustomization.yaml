apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../manifests
patches:
  # Category A: Namespace labels for OCP cluster monitoring + GitOps
  - target:
      kind: Namespace
      name: demo-webui
    patch: |
      - op: add
        path: /metadata/labels/openshift.io~1cluster-monitoring
        value: "true"
      - op: add
        path: /metadata/labels/argocd.argoproj.io~1managed-by
        value: openshift-gitops
  # Category C: PrometheusRule - remove release label for OCP
  - target:
      kind: PrometheusRule
      name: demo-app-alerts
    patch: |
      - op: replace
        path: /metadata/name
        value: demo-app-alerts-webui
      - op: remove
        path: /metadata/labels/release
      - op: replace
        path: /metadata/namespace
        value: openshift-monitoring
  # Category E: ServiceMonitor - remove release label for OCP
  - target:
      kind: ServiceMonitor
      name: demo-app-metrics
    patch: |
      - op: remove
        path: /metadata/labels/release
  # Category D: ArgoCD Application namespace argocd -> openshift-gitops
  - target:
      kind: Application
      name: web-frontend
    patch: |
      - op: replace
        path: /metadata/namespace
        value: openshift-gitops
