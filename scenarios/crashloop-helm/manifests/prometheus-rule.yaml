apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kubernaut-crashloop-helm-rules
  namespace: demo-crashloop-helm
  labels:
    release: kube-prometheus-stack
spec:
  groups:
  - name: kubernaut-crashloop-helm
    rules:
    - alert: KubePodCrashLooping
      expr: |
        increase(
          kube_pod_container_status_restarts_total{
            namespace="demo-crashloop-helm",
            container="worker"
          }[10m]
        ) > 3
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: >
          Container {{ $labels.container }} in pod {{ $labels.pod }} is in
          CrashLoopBackOff with {{ $value | humanize }} restarts in the last 10 minutes.
        description: >
          Container {{ $labels.container }} in pod {{ $labels.pod }} (namespace
          {{ $labels.namespace }}) is repeatedly crashing and restarting. The
          deployment is managed by Helm (app.kubernetes.io/managed-by: Helm).
          The container is exiting with a non-zero exit code, indicating a
          startup failure or fatal runtime error.
