apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-cluster
  namespace: demo-autoscale
  labels:
    app: web-cluster
    kubernaut.ai/managed: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-cluster
  template:
    metadata:
      labels:
        app: web-cluster
    spec:
      nodeSelector:
        kubernaut.ai/managed: "true"
      containers:
      - name: web-cluster
        image: quay.io/kubernaut-cicd/demo-http-server:1.0.0
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: CONFIG_PATH
          value: /etc/demo-http-server/config.yaml
        volumeMounts:
        - name: config
          mountPath: /etc/demo-http-server/config.yaml
          subPath: config.yaml
        resources:
          requests:
            memory: "2Gi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: web-cluster-config
---
apiVersion: v1
kind: Service
metadata:
  name: web-cluster
  namespace: demo-autoscale
  labels:
    app: web-cluster
    kubernaut.ai/managed: "true"
    kubernaut.ai/metrics: "true"
spec:
  selector:
    app: web-cluster
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP
