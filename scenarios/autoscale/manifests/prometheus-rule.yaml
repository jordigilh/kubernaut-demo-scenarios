apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-loadtest
  labels:
    release: prometheus
spec:
  groups:
  - name: demo-app
    rules:
    - alert: KubePodSchedulingFailed
      expr: |
        kube_pod_status_phase{namespace="demo-loadtest", phase="Pending"} > 0
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: >
          One or more pods in namespace {{ $labels.namespace }} are stuck
          in Pending state.
        description: >
          Workload pods in namespace {{ $labels.namespace }} have not been
          scheduled. Service capacity may be degraded.
