apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service
  namespace: demo-telemetry
  labels:
    app: data-service
    kubernaut.ai/managed: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-service
  template:
    metadata:
      labels:
        app: data-service
    spec:
      containers:
      - name: app
        image: quay.io/kubernaut-cicd/demo-http-server:1.0.0
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "64Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
      - name: data-processor
        image: registry.k8s.io/e2e-test-images/busybox:1.29-2
        command: ["sh", "-c"]
        args:
        - |
          i=0
          while true; do
            dd if=/dev/urandom of=/data/leak_$i bs=1M count=1 2>/dev/null
            i=$((i + 1))
            sleep 5
          done
        volumeMounts:
        - name: data-cache
          mountPath: /data
        resources:
          requests:
            memory: "32Mi"
            cpu: "5m"
          limits:
            memory: "192Mi"
            cpu: "20m"
      volumes:
      - name: data-cache
        emptyDir:
          medium: Memory
          sizeLimit: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: data-service
  namespace: demo-telemetry
  labels:
    app: data-service
    kubernaut.ai/managed: "true"
spec:
  selector:
    app: data-service
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
