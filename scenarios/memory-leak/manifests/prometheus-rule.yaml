apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: memory-leak-rules
  namespace: demo-memory-leak
  labels:
    release: prometheus
spec:
  groups:
  - name: memory-leak
    rules:
    # Predict memory exhaustion using linear extrapolation
    # Fires when the "leaker" container is projected to exceed its memory limit
    # within 30 minutes (1800s) based on the last 5-minute trend
    - alert: ContainerMemoryExhaustionPredicted
      expr: |
        predict_linear(
          container_memory_working_set_bytes{
            namespace="demo-memory-leak",
            container="leaker"
          }[5m], 1800
        )
        >
        on(namespace, pod, container)
        kube_pod_container_resource_limits{
          namespace="demo-memory-leak",
          container="leaker",
          resource="memory"
        }
      for: 30s
      labels:
        severity: warning
      annotations:
        summary: >
          Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }}
          predicted to exceed memory limit within 30 minutes.
        description: >
          Linear extrapolation of container_memory_working_set_bytes over the last
          5 minutes projects that container {{ $labels.container }} in pod
          {{ $labels.pod }} (namespace {{ $labels.namespace }}) will exceed its
          configured memory limit within approximately 30 minutes at the current
          growth rate. The memory usage pattern is monotonically increasing,
          consistent with a memory leak or unbounded allocation. If unaddressed,
          the kubelet will OOMKill the container, potentially disrupting the
          service.
