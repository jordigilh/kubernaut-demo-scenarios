apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-telemetry
  labels:
    release: prometheus
spec:
  groups:
  - name: demo-app
    rules:
    - alert: ContainerMemoryExhaustionPredicted
      expr: |
        predict_linear(
          container_memory_working_set_bytes{
            namespace="demo-telemetry"
          }[5m], 1800
        )
        >
        on(namespace, pod, container)
        kube_pod_container_resource_limits{
          namespace="demo-telemetry",
          resource="memory"
        }
      for: 30s
      labels:
        severity: warning
      annotations:
        summary: >
          Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }}
          predicted to exceed memory limit within 30 minutes.
        description: >
          A container in namespace {{ $labels.namespace }} is projected to exceed
          its configured memory limit based on recent growth trends. Service
          stability may be at risk.
