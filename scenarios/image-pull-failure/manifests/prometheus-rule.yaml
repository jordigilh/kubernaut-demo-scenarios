apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-inventory
  labels:
    release: prometheus
spec:
  groups:
    - name: demo-app
      rules:
        - alert: ImagePullBackOffPersistent
          expr: |
            kube_pod_container_status_waiting_reason{
              reason="ImagePullBackOff",
              namespace="demo-inventory"
            } > 0
          for: 60s
          labels:
            severity: high
          annotations:
            summary: >
              Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is not
              reaching a ready state.
            description: >
              Container {{ $labels.container }} in pod {{ $labels.pod }} has
              remained in a non-ready waiting state. Workload availability
              may be degraded.
