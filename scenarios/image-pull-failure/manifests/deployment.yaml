apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-api
  namespace: demo-imagepull
  labels:
    app: inventory-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-api
  template:
    metadata:
      labels:
        app: inventory-api
    spec:
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: inventory-api
          image: docker.io/library/busybox:1.36
          command: ["/bin/sh", "-c", "while true; do sleep 3600; done"]
