apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-scheduler
  labels:
    release: prometheus
spec:
  groups:
  - name: demo-app
    rules:
    # Detect pods stuck in Pending state for more than 3 minutes
    - alert: KubePodNotScheduled
      expr: |
        kube_pod_status_phase{namespace="demo-scheduler", phase="Pending"} == 1
      for: 30s
      labels:
        severity: warning
      annotations:
        summary: >
          Pod {{ $labels.pod }} in namespace {{ $labels.namespace }}
          has been unscheduled for an extended period.
        description: >
          One or more pods in namespace {{ $labels.namespace }} are in Pending
          state and have not been assigned to a node. Workload availability
          may be degraded.
