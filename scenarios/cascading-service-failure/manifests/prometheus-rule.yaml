apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cascading-failure-rules
  namespace: demo-cascade
  labels:
    release: prometheus
spec:
  groups:
  - name: cascading-service-failure
    rules:
    - alert: KubePodCrashLooping
      expr: |
        rate(
          kube_pod_container_status_restarts_total{
            namespace="demo-cascade",
            container="app"
          }[5m]
        ) * 300 > 3
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: >
          Pod {{ $labels.pod }} in namespace {{ $labels.namespace }}
          is crash-looping ({{ $value | printf "%.0f" }} restarts in 5 minutes).
        description: >
          Container {{ $labels.container }} in pod {{ $labels.pod }}
          is restarting repeatedly. The container is exiting with a
          non-zero exit code.
