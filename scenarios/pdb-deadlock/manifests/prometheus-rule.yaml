apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-payments
  labels:
    release: prometheus
spec:
  groups:
  - name: demo-app
    rules:
    # Detect PDB blocking disruptions (0 allowed disruptions for extended period)
    - alert: KubePodDisruptionBudgetAtLimit
      expr: |
        max by (namespace, poddisruptionbudget) (
          kube_poddisruptionbudget_status_pod_disruptions_allowed{
            namespace="demo-payments",
            poddisruptionbudget="payment-service-pdb"
          } == 0
          and
          kube_poddisruptionbudget_status_expected_pods{
            namespace="demo-payments",
            poddisruptionbudget="payment-service-pdb"
          }
          ==
          kube_poddisruptionbudget_status_current_healthy{
            namespace="demo-payments",
            poddisruptionbudget="payment-service-pdb"
          }
        )
      for: 30s
      labels:
        severity: warning
        namespace: demo-payments
        poddisruptionbudget: payment-service-pdb
      annotations:
        summary: >
          PDB {{ $labels.poddisruptionbudget }} in namespace {{ $labels.namespace }}
          has zero allowed disruptions.
        description: >
          A PodDisruptionBudget in namespace {{ $labels.namespace }} currently
          permits zero voluntary disruptions. Cluster maintenance operations
          may be affected.
