apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../manifests
patches:
  # Category A: Namespace labels for OCP cluster monitoring and ArgoCD RBAC
  - target:
      kind: Namespace
      name: demo-warehouse
    patch: |
      - op: add
        path: /metadata/labels/openshift.io~1cluster-monitoring
        value: "true"
      - op: add
        path: /metadata/labels/argocd.argoproj.io~1managed-by
        value: openshift-gitops
  # Category B: PostgreSQL -- Red Hat image, env vars, and data paths
  - target:
      kind: Deployment
      name: postgres
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: quay.io/sclorg/postgresql-16-c9s
      - op: replace
        path: /spec/template/spec/containers/0/env/0/name
        value: POSTGRESQL_USER
      - op: replace
        path: /spec/template/spec/containers/0/env/1/name
        value: POSTGRESQL_DATABASE
      - op: replace
        path: /spec/template/spec/containers/0/env/2/name
        value: POSTGRESQL_PASSWORD
      - op: replace
        path: /spec/template/spec/containers/0/env/3/value
        value: "/var/lib/pgsql/data/userdata"
      - op: replace
        path: /spec/template/spec/containers/0/volumeMounts/0/mountPath
        value: /var/lib/pgsql/data
  # Category C: PrometheusRule - move to openshift-monitoring so platform
  # Prometheus (which scrapes node_filesystem_avail_bytes) evaluates it,
  # and remove the Kind-specific release label.
  - target:
      kind: PrometheusRule
      name: demo-app-alerts
    patch: |
      - op: replace
        path: /metadata/name
        value: demo-app-alerts-warehouse
      - op: replace
        path: /metadata/namespace
        value: openshift-monitoring
      - op: remove
        path: /metadata/labels/release
  # Category D: ArgoCD Application namespace argocd -> openshift-gitops
  - target:
      kind: Application
      name: demo-warehouse
    patch: |
      - op: replace
        path: /metadata/namespace
        value: openshift-gitops
