apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../manifests
patches:
  # Category A: Namespace label for OCP cluster monitoring
  - target:
      kind: Namespace
      name: demo-diskpressure
    patch: |
      - op: add
        path: /metadata/labels/openshift.io~1cluster-monitoring
        value: "true"
      - op: add
        path: /metadata/labels/argocd.argoproj.io~1managed-by
        value: openshift-gitops
  # Category B: PostgreSQL -- Red Hat image, env vars, and data paths
  - target:
      kind: Deployment
      name: postgres-emptydir
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: registry.redhat.io/rhel9/postgresql-16
      - op: replace
        path: /spec/template/spec/containers/0/env/0/name
        value: POSTGRESQL_USER
      - op: replace
        path: /spec/template/spec/containers/0/env/1/name
        value: POSTGRESQL_DATABASE
      - op: replace
        path: /spec/template/spec/containers/0/env/2/name
        value: POSTGRESQL_PASSWORD
      - op: replace
        path: /spec/template/spec/containers/0/env/3/value
        value: "/var/lib/pgsql/data/userdata"
      - op: replace
        path: /spec/template/spec/containers/0/volumeMounts/0/mountPath
        value: /var/lib/pgsql/data
  # Category C: PrometheusRule - remove release label for OCP
  - target:
      kind: PrometheusRule
      name: demo-diskpressure-rules
    patch: |
      - op: remove
        path: /metadata/labels/release
  # Category D: ArgoCD Application namespace argocd -> openshift-gitops
  - target:
      kind: Application
      name: demo-diskpressure
    patch: |
      - op: replace
        path: /metadata/namespace
        value: openshift-gitops
