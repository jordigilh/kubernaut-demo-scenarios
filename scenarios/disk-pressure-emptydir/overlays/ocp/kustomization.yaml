apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../manifests
patches:
  # Category A: Namespace label for OCP cluster monitoring
  - target:
      kind: Namespace
      name: demo-diskpressure
    patch: |
      - op: add
        path: /metadata/labels/openshift.io~1cluster-monitoring
        value: "true"
  # Category B: PostgreSQL image swap to Red Hat catalog
  - target:
      kind: Deployment
      name: postgres-emptydir
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: registry.redhat.io/rhel9/postgresql-16
  # Category C: PrometheusRule - remove release label for OCP
  - target:
      kind: PrometheusRule
      name: demo-diskpressure-rules
    patch: |
      - op: remove
        path: /metadata/labels/release
  # Category D: ArgoCD Application namespace argocd -> openshift-gitops
  - target:
      kind: Application
      name: demo-diskpressure
    patch: |
      - op: replace
        path: /metadata/namespace
        value: openshift-gitops
