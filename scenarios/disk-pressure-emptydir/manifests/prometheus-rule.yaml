apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-diskpressure-rules
  namespace: demo-diskpressure
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: demo-diskpressure
      rules:
        # Proactive alert: fires BEFORE DiskPressure occurs (BR-SP-106 / ADR-054).
        # SP normalizes PredictedDiskPressure -> DiskPressure (signalMode=proactive).
        # predict_linear() projects disk exhaustion based on recent growth trend.
        # Window [3m] balances slope accuracy vs. speed; 900s horizon gives the
        # pipeline ~6 min margin (LLM ~2m + approve + AWX + pg_dump) before
        # eviction; for: 1m sustain.
        - alert: PredictedDiskPressure
          expr: |
            predict_linear(
              node_filesystem_avail_bytes{mountpoint="/", instance=~"stress-worker.*"}[3m],
              900
            ) < 0
          for: 1m
          labels:
            severity: warning
            namespace: demo-diskpressure
            node: '{{ $labels.instance }}'
          annotations:
            summary: "Node {{ $labels.instance }} predicted to exhaust disk within 15 minutes"
            description: >-
              Linear regression on node {{ $labels.instance }} filesystem usage
              over the last 3 minutes predicts available space will reach
              zero within 15 minutes. This is likely caused by emptyDir growth
              from the postgres-emptydir deployment in demo-diskpressure
              namespace. Proactive remediation can migrate the database to
              persistent storage before data loss occurs.
