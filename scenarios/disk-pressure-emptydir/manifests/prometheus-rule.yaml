apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-warehouse
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: demo-app
      rules:
        - alert: PredictedDiskPressure
          expr: |
            predict_linear(
              node_filesystem_avail_bytes{mountpoint="/", instance=~"stress-worker.*"}[1m],
              1800
            ) < 0
          for: 15s
          labels:
            severity: high
            namespace: demo-warehouse
            node: '{{ $labels.instance }}'
            environment: production
            component: deployment
          annotations:
            summary: "Node {{ $labels.instance }} predicted to exhaust disk within 30 minutes."
            description: "Linear regression on node {{ $labels.instance }} projects available disk space will reach zero within 30 minutes at the current write rate. Pod evictions may occur."
