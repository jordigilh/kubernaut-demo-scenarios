apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-cache
  namespace: demo-diskpressure
  labels:
    app: nginx-cache
    role: noise
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-cache
  template:
    metadata:
      labels:
        app: nginx-cache
        role: noise
    spec:
      nodeSelector:
        scenario: disk-pressure
      tolerations:
      - key: scenario
        value: disk-pressure
        effect: NoSchedule
      containers:
      - name: nginx
        image: nginxinc/nginx-unprivileged:1.27-alpine
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        volumeMounts:
        - name: cache
          mountPath: /tmp/nginx-cache
      volumes:
      - name: cache
        emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-collector
  namespace: demo-diskpressure
  labels:
    app: log-collector
    role: noise
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-collector
  template:
    metadata:
      labels:
        app: log-collector
        role: noise
    spec:
      nodeSelector:
        scenario: disk-pressure
      tolerations:
      - key: scenario
        value: disk-pressure
        effect: NoSchedule
      containers:
      - name: logger
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - |
          i=0
          while true; do
            dd if=/dev/urandom bs=1M count=1 of=/var/log/app/logfile-$((i % 50)).log 2>/dev/null
            i=$((i + 1))
            sleep 2
          done
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "64Mi"
            cpu: "50m"
        volumeMounts:
        - name: logs
          mountPath: /var/log/app
      volumes:
      - name: logs
        emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-scratch
  namespace: demo-diskpressure
  labels:
    app: redis-scratch
    role: noise
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-scratch
  template:
    metadata:
      labels:
        app: redis-scratch
        role: noise
    spec:
      nodeSelector:
        scenario: disk-pressure
      tolerations:
      - key: scenario
        value: disk-pressure
        effect: NoSchedule
      containers:
      - name: redis
        image: redis:7-alpine
        args: ["--appendonly", "yes", "--dir", "/data"]
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        emptyDir: {}
