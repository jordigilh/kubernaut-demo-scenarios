apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../manifests
patches:
  - target:
      kind: Namespace
      name: demo-netpol
    patch: |
      - op: add
        path: /metadata/labels/openshift.io~1cluster-monitoring
        value: "true"
  - target:
      kind: PrometheusRule
      name: kubernaut-netpol-rules
    patch: |
      - op: remove
        path: /metadata/labels/release
  - target:
      kind: ServiceMonitor
      name: demo-app-metrics
    patch: |
      - op: remove
        path: /metadata/labels/release
  - target:
      kind: Deployment
      name: traffic-gen
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/securityContext
        value:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop: ["ALL"]
