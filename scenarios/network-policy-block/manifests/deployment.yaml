apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-frontend
  namespace: demo-netpol
  labels:
    app: web-frontend
    kubernaut.ai/managed: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-frontend
  template:
    metadata:
      labels:
        app: web-frontend
    spec:
      containers:
      - name: web
        image: quay.io/kubernaut-cicd/demo-http-server:1.0.0
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: CONFIG_PATH
          value: /etc/demo-http-server/config.yaml
        volumeMounts:
        - name: config
          mountPath: /etc/demo-http-server/config.yaml
          subPath: config.yaml
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 3
      volumes:
      - name: config
        configMap:
          name: web-frontend-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-frontend-config
  namespace: demo-netpol
data:
  config.yaml: |
    port: 8080
    routes:
      - path: /
        status: 200
        body: 'ok'
      - path: /healthz
        status: 200
        body: 'ok'
---
apiVersion: v1
kind: Service
metadata:
  name: web-frontend
  namespace: demo-netpol
  labels:
    app: web-frontend
    kubernaut.ai/managed: "true"
    kubernaut.ai/metrics: "true"
spec:
  selector:
    app: web-frontend
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-gen
  namespace: demo-netpol
  labels:
    app: traffic-gen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-gen
  template:
    metadata:
      labels:
        app: traffic-gen
    spec:
      containers:
      - name: curl
        image: curlimages/curl:8.12.1
        command: ["/bin/sh", "-c"]
        args:
        - |
          while true; do
            if curl -sf -o /dev/null -m 2 http://web-frontend.demo-netpol:8080/healthz; then
              echo "probe=success"
            else
              echo "probe=failure"
            fi
            sleep 5
          done
        resources:
          requests:
            memory: "16Mi"
            cpu: "5m"
          limits:
            memory: "32Mi"
            cpu: "20m"
        readinessProbe:
          exec:
            command: ["curl", "-sf", "-o", "/dev/null", "-m", "3", "http://web-frontend.demo-netpol:8080/healthz"]
          initialDelaySeconds: 5
          periodSeconds: 5
