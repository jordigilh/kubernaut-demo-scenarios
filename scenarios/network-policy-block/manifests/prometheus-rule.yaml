apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-frontend
  labels:
    release: prometheus
spec:
  groups:
  - name: demo-app
    rules:
    # Primary signal: traffic-gen becomes NotReady because its readiness probe
    # (curl to web-frontend) fails when deny-all blocks inter-pod traffic.
    # Self-resolving: clears immediately when the NetworkPolicy is removed.
    - alert: KubeDeploymentReplicasMismatch
      expr: |
        kube_deployment_status_replicas_unavailable{
          namespace="demo-frontend",
          deployment="traffic-gen"
        } > 0
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: >
          Deployment {{ $labels.deployment }} in namespace {{ $labels.namespace }}
          has unavailable replicas.
        description: >
          Pods in deployment {{ $labels.deployment }} are not passing readiness
          checks. Service traffic may not be reaching healthy endpoints.
    # Secondary signal: web-frontend replicas unavailable. Fires on platforms
    # where the CNI also blocks kubelet probes (e.g. OCP with OVN-Kubernetes).
    - alert: KubeDeploymentReplicasMismatch
      expr: |
        kube_deployment_status_replicas_unavailable{
          namespace="demo-frontend",
          deployment="web-frontend"
        } > 0
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: >
          Deployment {{ $labels.deployment }} has {{ $value }} unavailable replicas
          in namespace {{ $labels.namespace }}.
        description: >
          Deployment {{ $labels.deployment }} has unavailable replicas.
          Health checks are failing, which may affect service availability.
