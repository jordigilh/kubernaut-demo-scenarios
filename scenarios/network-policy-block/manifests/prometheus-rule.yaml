apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kubernaut-netpol-rules
  namespace: demo-netpol
  labels:
    release: prometheus
spec:
  groups:
  - name: kubernaut-netpol
    rules:
    # Primary signal: traffic-gen becomes NotReady because its readiness probe
    # (curl to web-frontend) fails when deny-all blocks inter-pod traffic.
    # Self-resolving: clears immediately when the NetworkPolicy is removed.
    - alert: KubeDeploymentReplicasMismatch
      expr: |
        kube_deployment_status_replicas_unavailable{
          namespace="demo-netpol",
          deployment="traffic-gen"
        } > 0
      for: 3m
      labels:
        severity: critical
      annotations:
        summary: >
          Traffic generator in namespace {{ $labels.namespace }} has unavailable
          replicas due to connectivity failure to web-frontend service.
        description: >
          The traffic-gen pod cannot reach web-frontend via the cluster network
          (readiness probe failing). A NetworkPolicy is likely blocking inter-pod
          ingress traffic in namespace demo-netpol.
    # Secondary signal: web-frontend replicas unavailable. Fires on platforms
    # where the CNI also blocks kubelet probes (e.g. OCP with OVN-Kubernetes).
    - alert: KubeDeploymentReplicasMismatch
      expr: |
        kube_deployment_status_replicas_unavailable{
          namespace="demo-netpol",
          deployment="web-frontend"
        } > 0
      for: 3m
      labels:
        severity: critical
      annotations:
        summary: >
          Deployment {{ $labels.deployment }} has {{ $value }} unavailable replicas
          in namespace {{ $labels.namespace }}.
        description: >
          The web-frontend deployment has unavailable replicas, likely due to
          health check failures caused by a NetworkPolicy blocking ingress traffic.
