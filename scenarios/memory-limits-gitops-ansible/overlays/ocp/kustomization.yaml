apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../manifests
patches:
  # Category A: Namespace label for OCP cluster monitoring
  - target:
      kind: Namespace
      name: demo-memory-gitops-ansible
    patch: |
      - op: add
        path: /metadata/labels/openshift.io~1cluster-monitoring
        value: "true"
  # Category C: PrometheusRule - remove release label for OCP
  - target:
      kind: PrometheusRule
      name: demo-memory-gitops-ansible-oomkill
    patch: |
      - op: remove
        path: /metadata/labels/release
  # Category D: ArgoCD Application namespace argocd -> openshift-gitops
  - target:
      kind: Application
      name: demo-memory-gitops-ansible
    patch: |
      - op: replace
        path: /metadata/namespace
        value: openshift-gitops
