apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-checkout
  labels:
    release: prometheus
spec:
  groups:
  - name: demo-app
    rules:
    - alert: KubePodCrashLooping
      expr: |
        increase(
          kube_pod_container_status_restarts_total{
            namespace="demo-checkout"
          }[1m]
        ) > 0
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: >
          Container {{ $labels.container }} in pod {{ $labels.pod }}
          is restarting repeatedly ({{ $value | humanize }} restarts in 5m).
        description: >
          A container in namespace {{ $labels.namespace }} is failing to
          reach a stable running state. Elevated restart rate may indicate
          service degradation.
