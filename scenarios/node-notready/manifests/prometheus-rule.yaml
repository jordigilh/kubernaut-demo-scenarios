apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-compute
  labels:
    release: prometheus
spec:
  groups:
  - name: demo-app
    rules:
    - alert: KubeNodeNotReady
      expr: |
        max by (node) (
          kube_node_status_condition{condition="Ready", status="true"} == 0
        )
      for: 30s
      labels:
        severity: critical
        namespace: demo-compute
      annotations:
        summary: >
          Node {{ $labels.node }} is in NotReady state.
        description: >
          A cluster node has transitioned to NotReady status. Workloads
          scheduled on this node may experience disruption or reduced
          availability.
