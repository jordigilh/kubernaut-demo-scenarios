apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kubernaut-node-notready-rules
  namespace: demo-node
  labels:
    release: prometheus
spec:
  groups:
  - name: kubernaut-node-notready
    rules:
    - alert: KubeNodeNotReady
      expr: |
        max by (node) (
          kube_node_status_condition{condition="Ready", status="true"} == 0
        )
      for: 30s
      labels:
        severity: critical
        namespace: demo-node
      annotations:
        summary: >
          Node {{ $labels.node }} is in NotReady state for more than 1 minute.
        description: >
          Node {{ $labels.node }} has transitioned to NotReady status, indicating
          the kubelet is no longer reporting healthy. Pods scheduled on this node
          may experience disruption. If the condition persists beyond the
          pod-eviction-timeout, the controller manager will begin evicting pods
          from the node.
