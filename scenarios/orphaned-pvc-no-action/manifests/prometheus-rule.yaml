apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-batch
  labels:
    release: prometheus
spec:
  groups:
  - name: demo-app
    rules:
    - alert: KubePersistentVolumeClaimOrphaned
      expr: |
        count by (namespace)(
          kube_persistentvolumeclaim_status_phase{
            namespace="demo-batch",
            phase="Bound"
          }
        ) > 3
      for: 30s
      labels:
        severity: warning
        deployment: data-processor
      annotations:
        summary: >
          Namespace {{ $labels.namespace }} has more than 3 bound PVCs.
        description: >
          Namespace {{ $labels.namespace }} has accumulated more than 3 bound
          PersistentVolumeClaims. Unused storage may be consuming cluster
          capacity.
