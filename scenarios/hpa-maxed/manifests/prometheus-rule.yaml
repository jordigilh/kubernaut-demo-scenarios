apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-gateway
  labels:
    release: prometheus
spec:
  groups:
  - name: demo-app
    rules:
    # Detect HPA at maxReplicas while still under CPU pressure
    - alert: KubeHpaMaxedOut
      expr: |
        kube_horizontalpodautoscaler_status_current_replicas{namespace="demo-gateway", horizontalpodautoscaler="api-frontend"}
        ==
        kube_horizontalpodautoscaler_spec_max_replicas{namespace="demo-gateway", horizontalpodautoscaler="api-frontend"}
      for: 30s
      labels:
        severity: warning
      annotations:
        summary: >
          Workload {{ $labels.horizontalpodautoscaler }} in namespace
          {{ $labels.namespace }} is not gaining additional capacity.
        description: >
          A workload in namespace {{ $labels.namespace }} is not scaling out
          despite sustained demand. Service degradation may occur if load
          continues to exceed current replica capacity.
