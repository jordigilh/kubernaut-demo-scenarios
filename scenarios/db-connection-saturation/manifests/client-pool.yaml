apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-pool
  namespace: demo-orders
  labels:
    app: client-pool
    kubernaut.ai/managed: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client-pool
  template:
    metadata:
      labels:
        app: client-pool
    spec:
      containers:
      - name: client-pool
        image: image-registry.openshift-image-registry.svc:5000/openshift/postgresql:15-el9
        command: ["sh", "-c"]
        args:
        - |
          echo "[client-pool] Starting connection pool simulation"
          echo "[client-pool] Target: postgres.demo-orders.svc:5432"
          echo "[client-pool] Will open 12 persistent connections then idle"
          MAX_LEAKED=12
          i=0
          while [ "$i" -lt "$MAX_LEAKED" ]; do
            i=$((i + 1))
            echo "[client-pool] Opening persistent connection #$i/$MAX_LEAKED to postgres"
            PGPASSWORD=demo psql -h postgres -U demo -d demo -c "SELECT pg_sleep(86400)" &
            sleep 8
          done
          echo "[client-pool] Reached $MAX_LEAKED persistent connections, idling"
          sleep infinity
        resources:
          requests:
            memory: "32Mi"
            cpu: "5m"
          limits:
            memory: "64Mi"
            cpu: "50m"
