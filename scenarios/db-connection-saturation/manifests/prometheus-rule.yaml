apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-orders
  labels:
    release: prometheus
spec:
  groups:
  - name: demo-app
    rules:
    - alert: DatabaseConnectionPoolExhausted
      expr: |
        sum by (namespace) (pg_stat_activity_count{
          namespace="demo-orders",
          datname="demo"
        }) > 10
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: >
          PostgreSQL in namespace {{ $labels.namespace }} has elevated
          active connections ({{ $value }}).
        description: >
          Client applications in namespace {{ $labels.namespace }} may
          experience connection failures. Database availability may be
          degraded.
