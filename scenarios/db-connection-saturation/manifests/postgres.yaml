apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: demo-db-saturation
  labels:
    app: postgres
    kubernaut.ai/managed: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: image-registry.openshift-image-registry.svc:5000/openshift/postgresql:15-el9
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRESQL_USER
          value: demo
        - name: POSTGRESQL_PASSWORD
          value: demo
        - name: POSTGRESQL_DATABASE
          value: demo
        - name: POSTGRESQL_MAX_CONNECTIONS
          value: "15"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "demo"]
          initialDelaySeconds: 10
          periodSeconds: 10
      - name: exporter
        image: quay.io/prometheuscommunity/postgres-exporter:latest
        env:
        - name: DATA_SOURCE_NAME
          value: "postgresql://demo:demo@localhost:5432/demo?sslmode=disable"
        ports:
        - containerPort: 9187
          name: metrics
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: demo-db-saturation
  labels:
    app: postgres
    kubernaut.ai/managed: "true"
spec:
  selector:
    app: postgres
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
  - name: metrics
    port: 9187
    targetPort: 9187
  type: ClusterIP
