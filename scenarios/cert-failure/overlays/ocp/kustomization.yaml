apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../manifests
patches:
  # Category A: Namespace label for OCP cluster monitoring
  - target:
      kind: Namespace
      name: demo-cert-failure
    patch: |
      - op: add
        path: /metadata/labels/openshift.io~1cluster-monitoring
        value: "true"
  # Category E: nginx TLS on 443 -> nginx-unprivileged on 8443
  - target:
      kind: Deployment
      name: demo-app
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: nginxinc/nginx-unprivileged:1.27-alpine
      - op: replace
        path: /spec/template/spec/containers/0/ports/0/containerPort
        value: 8443
  - target:
      kind: Service
      name: demo-app
    patch: |
      - op: replace
        path: /spec/ports/0/port
        value: 8443
      - op: replace
        path: /spec/ports/0/targetPort
        value: 8443
  # Category C: PrometheusRule - remove release label for OCP
  - target:
      kind: PrometheusRule
      name: kubernaut-cert-failure-rules
    patch: |
      - op: remove
        path: /metadata/labels/release
