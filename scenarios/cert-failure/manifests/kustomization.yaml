apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  # ca-secret.yaml is NOT applied here; run.sh Step 1 generates a real
  # self-signed CA via openssl and applies it directly.
  - certificate.yaml
  - clusterissuer.yaml
  - deployment.yaml
  - prometheus-rule.yaml
  - servicemonitor.yaml
