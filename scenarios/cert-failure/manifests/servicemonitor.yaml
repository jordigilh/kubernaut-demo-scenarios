# ServiceMonitor for cert-manager metrics scraping (BR-SP-001)
# Required for CertManagerCertNotReady alert to fire -- Prometheus must scrape
# certmanager_certificate_ready_status from the cert-manager controller.
# Named kubernaut-cert-manager-demo to avoid collision with platform-installed
# ServiceMonitors (e.g. OLM cert-manager operator on OCP).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kubernaut-cert-manager-demo
  namespace: cert-manager
  labels:
    release: kube-prometheus-stack
    app.kubernetes.io/managed-by: kubernaut-demo-scenarios
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: controller
      app.kubernetes.io/instance: cert-manager
  endpoints:
  - port: tcp-prometheus-servicemonitor
    interval: 15s
