apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-portal
  labels:
    release: prometheus
spec:
  groups:
  - name: demo-app
    rules:
    - alert: CertManagerCertNotReady
      expr: |
        certmanager_certificate_ready_status{
          exported_namespace="demo-portal",
          name="demo-app-cert",
          condition="True"
        } == 0
      for: 30s
      labels:
        severity: critical
        deployment: demo-app
        namespace: demo-portal
      annotations:
        summary: >
          Certificate {{ $labels.name }} in namespace {{ $labels.namespace }}
          is not ready.
        description: >
          The demo-app-cert Certificate in namespace {{ $labels.namespace }}
          has been in a non-ready state for an extended period. TLS-protected
          service endpoints may be unavailable or degraded.
