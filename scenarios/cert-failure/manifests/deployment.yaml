apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: demo-cert-failure
  labels:
    app: demo-app
    kubernaut.ai/managed: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
      - name: demo-app
        image: quay.io/kubernaut-cicd/demo-http-server:1.0.0
        ports:
        - containerPort: 8443
          name: https
        env:
        - name: LISTEN_PORT
          value: "8443"
        - name: TLS_CERT_DIR
          value: /etc/tls
        volumeMounts:
        - name: tls
          mountPath: /etc/tls
          readOnly: true
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
      volumes:
      - name: tls
        secret:
          secretName: demo-app-tls
          optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: demo-cert-failure
  labels:
    app: demo-app
    kubernaut.ai/managed: "true"
    kubernaut.ai/metrics: "true"
spec:
  selector:
    app: demo-app
  ports:
  - port: 8443
    targetPort: 8443
    name: http
  type: ClusterIP
