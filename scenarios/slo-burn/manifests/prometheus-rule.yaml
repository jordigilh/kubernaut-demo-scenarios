apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-api
  labels:
    release: prometheus
spec:
  groups:
  - name: demo-app
    rules:
    # 5m rolling error rate from blackbox probe results
    # probe_success is 0 (fail) or 1 (pass), probed every 10s
    - record: job:api_gateway:error_rate_5m
      expr: |
        1 - avg_over_time(probe_success{namespace="demo-api", instance=~".*api-gateway.*"}[5m])

    # Alert when error rate exceeds threshold
    - alert: ErrorBudgetBurn
      expr: |
        job:api_gateway:error_rate_5m > (0.001 * 14.4)
      for: 30s
      labels:
        severity: critical
        deployment: api-gateway
      annotations:
        summary: >
          Service api-gateway error rate is
          {{ $value | humanizePercentage }} over the last 5 minutes.
        description: >
          Probes to api-gateway in namespace demo-api are failing at an
          elevated rate. The /api/ endpoint is returning errors.
