apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: demo-slo
  labels:
    app: api-gateway
data:
  config.yaml: |
    port: 8080
    routes:
      - path: /api/status
        status: 200
        body: '{"status": "ok"}'
      - path: /api/
        status: 200
        body: '{"status": "ok"}'
      - path: /healthz
        status: 200
        body: 'ok'
