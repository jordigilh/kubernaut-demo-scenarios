apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../manifests
patches:
  - target:
      kind: Namespace
      name: demo-api
    patch: |
      - op: add
        path: /metadata/labels/openshift.io~1cluster-monitoring
        value: "true"
  - target:
      kind: Probe
      name: api-gateway-probe
    patch: |
      - op: remove
        path: /metadata/labels/release
  - target:
      kind: PrometheusRule
      name: demo-app-alerts
    patch: |
      - op: replace
        path: /metadata/name
        value: demo-app-alerts-api
      - op: remove
        path: /metadata/labels/release
      - op: replace
        path: /metadata/namespace
        value: openshift-monitoring
      # OCP kube-state-metrics scrape interval is 1m (vs 30s on Kind).
      # A [5m] window needs ~6m of clean probes to clear on OCP, which
      # exceeds the 5m EA stabilization window and causes Inconclusive.
      # Shrink to [2m] so the alert resolves well within EA's window (#293).
      - op: replace
        path: /spec/groups/0/rules/0/record
        value: "job:api_gateway:error_rate_2m"
      - op: replace
        path: /spec/groups/0/rules/0/expr
        value: "1 - avg_over_time(probe_success{namespace=\"demo-api\", instance=~\".*api-gateway.*\"}[2m])\n"
      - op: replace
        path: /spec/groups/0/rules/1/expr
        value: "job:api_gateway:error_rate_2m > (0.001 * 14.4)\n"
      - op: replace
        path: /spec/groups/0/rules/1/annotations/description
        value: "Probes to api-gateway in namespace demo-api are failing at an elevated rate over the last 2 minutes. The /api/ endpoint is returning errors."
  - target:
      kind: ServiceMonitor
      name: demo-app-metrics
    patch: |
      - op: remove
        path: /metadata/labels/release
