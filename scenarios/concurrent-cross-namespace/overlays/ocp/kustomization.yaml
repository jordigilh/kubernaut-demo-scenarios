apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../manifests
patches:
  - target:
      kind: Namespace
      name: demo-team-alpha
    patch: |
      - op: add
        path: /metadata/labels/openshift.io~1cluster-monitoring
        value: "true"
  - target:
      kind: Namespace
      name: demo-team-beta
    patch: |
      - op: add
        path: /metadata/labels/openshift.io~1cluster-monitoring
        value: "true"
  - target:
      kind: PrometheusRule
      name: kubernaut-alpha-rules
    patch: |
      - op: remove
        path: /metadata/labels/release
  - target:
      kind: PrometheusRule
      name: kubernaut-beta-rules
    patch: |
      - op: remove
        path: /metadata/labels/release
  - target:
      kind: Deployment
      name: worker
      namespace: demo-team-alpha
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: nginxinc/nginx-unprivileged:1.27-alpine
  - target:
      kind: Deployment
      name: worker
      namespace: demo-team-beta
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: nginxinc/nginx-unprivileged:1.27-alpine
