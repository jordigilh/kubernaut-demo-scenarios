apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../manifests
patches:
  - target:
      kind: Namespace
      name: demo-team-alpha
    patch: |
      - op: add
        path: /metadata/labels/openshift.io~1cluster-monitoring
        value: "true"
  - target:
      kind: Namespace
      name: demo-team-beta
    patch: |
      - op: add
        path: /metadata/labels/openshift.io~1cluster-monitoring
        value: "true"
  - target:
      kind: PrometheusRule
      name: kubernaut-alpha-rules
    patch: |
      - op: remove
        path: /metadata/labels/release
      # OCP KSM scrape interval is 1m. increase(...[10m]) needs 10m+ to clear,
      # exceeding the 5m EA stabilization window. Shrink to [5m] (#293).
      - op: replace
        path: /spec/groups/0/rules/0/expr
        value: "increase(\n  kube_pod_container_status_restarts_total{\n    namespace=\"demo-team-alpha\",\n    container=\"worker\"\n  }[5m]\n) > 3\n"
  - target:
      kind: PrometheusRule
      name: kubernaut-beta-rules
    patch: |
      - op: remove
        path: /metadata/labels/release
      - op: replace
        path: /spec/groups/0/rules/0/expr
        value: "increase(\n  kube_pod_container_status_restarts_total{\n    namespace=\"demo-team-beta\",\n    container=\"worker\"\n  }[5m]\n) > 3\n"
  - target:
      kind: ServiceMonitor
      name: demo-app-metrics
      namespace: demo-team-alpha
    patch: |
      - op: remove
        path: /metadata/labels/release
  - target:
      kind: ServiceMonitor
      name: demo-app-metrics
      namespace: demo-team-beta
    patch: |
      - op: remove
        path: /metadata/labels/release
