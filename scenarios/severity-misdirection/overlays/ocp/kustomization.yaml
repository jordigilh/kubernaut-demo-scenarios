apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../manifests
patches:
  - target:
      kind: Namespace
      name: demo-services
    patch: |
      - op: add
        path: /metadata/labels/openshift.io~1cluster-monitoring
        value: "true"
  - target:
      kind: PrometheusRule
      name: demo-app-alerts
    patch: |
      - op: replace
        path: /metadata/name
        value: demo-app-alerts-services
      - op: remove
        path: /metadata/labels/release
      - op: replace
        path: /metadata/namespace
        value: openshift-monitoring
