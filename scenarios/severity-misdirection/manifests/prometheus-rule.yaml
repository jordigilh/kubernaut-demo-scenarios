apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: severity-misdirection-rules
  namespace: demo-severity-misdirection
  labels:
    release: prometheus
spec:
  groups:
  - name: severity-misdirection
    rules:
    - alert: ContainerOOMKilling
      expr: |
        kube_pod_container_status_last_terminated_reason{
          namespace="demo-severity-misdirection",
          reason="OOMKilled"
        } > 0
      for: 30s
      labels:
        severity: warning
      annotations:
        summary: >
          Container {{ $labels.container }} in pod {{ $labels.pod }}
          has been OOM-killed in namespace {{ $labels.namespace }}.
        description: >
          The container was terminated due to exceeding its memory limit.
          The pod may restart but will likely be killed again if the memory
          pressure persists.
    - alert: KubePodCrashLooping
      expr: |
        rate(
          kube_pod_container_status_restarts_total{
            namespace="demo-severity-misdirection",
            container="app"
          }[5m]
        ) * 300 > 3
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: >
          Pod {{ $labels.pod }} in namespace {{ $labels.namespace }}
          is crash-looping ({{ $value | printf "%.0f" }} restarts in 5 minutes).
        description: >
          Container {{ $labels.container }} in pod {{ $labels.pod }}
          is restarting repeatedly. The container is exiting with a
          non-zero exit code.
