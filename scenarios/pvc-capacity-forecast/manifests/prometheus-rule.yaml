apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pvc-capacity-forecast-rules
  namespace: demo-pvc-forecast
  labels:
    release: prometheus
spec:
  groups:
  - name: pvc-capacity-forecast
    rules:
    - alert: PVRunwayShort
      expr: |
        predict_linear(
          kubelet_volume_stats_used_bytes{
            namespace="demo-pvc-forecast",
            persistentvolumeclaim="data-service-data"
          }[5m], 3600
        )
        >
        kubelet_volume_stats_capacity_bytes{
          namespace="demo-pvc-forecast",
          persistentvolumeclaim="data-service-data"
        }
      for: 30s
      labels:
        severity: warning
      annotations:
        summary: >
          PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }}
          is projected to exhaust capacity within 1 hour at current growth rate.
        description: >
          Linear extrapolation of kubelet_volume_stats_used_bytes over the last
          5 minutes projects that PVC {{ $labels.persistentvolumeclaim }} in
          namespace {{ $labels.namespace }} will exceed its provisioned capacity
          within approximately 1 hour at the current write rate. If the volume
          fills completely, applications writing to this volume will encounter
          I/O errors and potential data corruption.
