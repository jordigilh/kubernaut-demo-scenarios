apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-archive
  labels:
    release: prometheus
spec:
  groups:
  - name: demo-app
    rules:
    - alert: PVRunwayShort
      expr: |
        predict_linear(
          kubelet_volume_stats_used_bytes{
            namespace="demo-archive",
            persistentvolumeclaim="data-service-data"
          }[5m], 3600
        )
        >
        kubelet_volume_stats_capacity_bytes{
          namespace="demo-archive",
          persistentvolumeclaim="data-service-data"
        }
      for: 30s
      labels:
        severity: warning
      annotations:
        summary: >
          PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }}
          is projected to exhaust capacity within 1 hour.
        description: >
          A PersistentVolumeClaim in namespace {{ $labels.namespace }} is
          approaching its provisioned capacity. Applications using this
          volume may encounter I/O errors if capacity is exhausted.
