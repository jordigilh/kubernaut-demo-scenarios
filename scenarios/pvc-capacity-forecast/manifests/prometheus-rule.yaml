apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pvc-capacity-forecast-rules
  namespace: demo-pvc-forecast
  labels:
    release: prometheus
spec:
  groups:
  - name: pvc-capacity-forecast
    rules:
    - alert: PVRunwayShort
      expr: |
        predict_linear(
          kubelet_volume_stats_used_bytes{
            namespace="demo-pvc-forecast",
            persistentvolumeclaim="data-service-data"
          }[5m], 3600
        )
        >
        kubelet_volume_stats_capacity_bytes{
          namespace="demo-pvc-forecast",
          persistentvolumeclaim="data-service-data"
        }
      for: 30s
      labels:
        severity: warning
      annotations:
        summary: >
          PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }}
          is projected to exhaust capacity within 1 hour at current growth rate.
        description: >
          Storage usage on PVC data-service-data (StorageClass: lvms-vg1,
          allowVolumeExpansion: true) is growing linearly due to PostgreSQL
          database growth (audit_log table). At the current rate, it will
          exceed the provisioned 512Mi capacity before the next hour.
          The data is legitimate application data that must be preserved.
          Expand the PVC to prevent data loss and database crashes.
