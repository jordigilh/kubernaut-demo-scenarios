apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-ci
  labels:
    release: prometheus
spec:
  groups:
  - name: demo-app
    rules:
    - alert: BuildFailureRate
      expr: |
        (
          max by(buildconfig, namespace) (
            openshift_build_status_phase_total{build_phase="failed", namespace="demo-ci"}
            * on(build, namespace) group_left()
            openshift_build_created_timestamp_seconds{namespace="demo-ci"}
          )
        )
        >
        (
          max by(buildconfig, namespace) (
            openshift_build_status_phase_total{build_phase="complete", namespace="demo-ci"}
            * on(build, namespace) group_left()
            openshift_build_created_timestamp_seconds{namespace="demo-ci"}
          )
        )
      for: 30s
      labels:
        severity: high
        target_kind: BuildConfig
        target_name: "{{ $labels.buildconfig }}"
      annotations:
        summary: >
          BuildConfig {{ $labels.buildconfig }} in namespace {{ $labels.namespace }}
          has failing builds with no successful completions.
        description: >
          BuildConfig {{ $labels.buildconfig }} in namespace {{ $labels.namespace }}
          is producing failed builds with no recent successful completions.
          The CI/CD pipeline for this component may be unavailable.
