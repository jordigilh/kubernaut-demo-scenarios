apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-build-rules
  namespace: demo-build
  labels:
    release: prometheus
spec:
  groups:
  - name: demo-build
    rules:
    - alert: BuildFailureRate
      expr: |
        (
          max by(buildconfig, namespace) (
            openshift_build_status_phase_total{build_phase="failed", namespace="demo-build"}
            * on(build, namespace) group_left()
            openshift_build_created_timestamp_seconds{namespace="demo-build"}
          )
        )
        >
        (
          max by(buildconfig, namespace) (
            openshift_build_status_phase_total{build_phase="complete", namespace="demo-build"}
            * on(build, namespace) group_left()
            openshift_build_created_timestamp_seconds{namespace="demo-build"}
          )
        )
      for: 30s
      labels:
        severity: high
        target_kind: BuildConfig
        target_name: "{{ $labels.buildconfig }}"
      annotations:
        summary: >
          BuildConfig {{ $labels.buildconfig }} in namespace {{ $labels.namespace }}
          has failing builds with no successful completions.
        description: >
          The BuildConfig {{ $labels.buildconfig }} in namespace {{ $labels.namespace }}
          is producing failed builds. The remediation target is
          BuildConfig/{{ $labels.buildconfig }} in namespace {{ $labels.namespace }}.
          Check the latest Build resource status and build pod logs. Common causes
          include broken Git source references (wrong URL or branch), missing
          source secrets, or invalid builder image tags. Fix the BuildConfig's
          spec.source.git.uri or spec.source.git.ref to point to a valid repository.
