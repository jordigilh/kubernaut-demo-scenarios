apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-build-rules
  namespace: demo-build
  labels:
    release: prometheus
spec:
  groups:
  - name: demo-build
    rules:
    - alert: BuildFailureRate
      expr: |
        increase(openshift_build_status_phase_total{
          build_phase="failed",
          namespace="demo-build"
        }[5m]) > 0
        unless
        increase(openshift_build_status_phase_total{
          build_phase="complete",
          namespace="demo-build"
        }[5m]) > 0
      for: 60s
      labels:
        severity: high
      annotations:
        summary: >
          BuildConfig in namespace demo-build has failing builds with no
          successful completions in the last 5 minutes.
        description: >
          Builds in namespace demo-build are failing. Check the latest Build
          resource status and build pod logs. Common causes include broken
          Git source references (wrong URL or branch), missing source secrets,
          or invalid builder image tags.
