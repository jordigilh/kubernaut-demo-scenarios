apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: demo-quota
  labels:
    app: api-server
    kubernaut.ai/managed: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
      - name: api-server
        image: quay.io/kubernaut-cicd/demo-http-server:1.0.0
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: CONFIG_PATH
          value: /etc/demo-http-server/config.yaml
        volumeMounts:
        - name: config
          mountPath: /etc/demo-http-server/config.yaml
          subPath: config.yaml
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 3
      volumes:
      - name: config
        configMap:
          name: api-server-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: demo-quota
  labels:
    app: api-server
    kubernaut.ai/managed: "true"
    kubernaut.ai/metrics: "true"
spec:
  selector:
    app: api-server
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP
