apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kubernaut-quota-rules
  namespace: demo-quota
  labels:
    release: prometheus
spec:
  groups:
  - name: kubernaut-resource-quota
    rules:
    - alert: KubeResourceQuotaExhausted
      expr: |
        (
          kube_replicaset_spec_replicas{namespace="demo-quota"}
          -
          kube_replicaset_status_ready_replicas{namespace="demo-quota"}
        ) > 0
      for: 30s
      labels:
        severity: warning
      annotations:
        summary: >
          ReplicaSet {{ $labels.replicaset }} in namespace {{ $labels.namespace }}
          has {{ $value }} fewer ready pods than desired. ResourceQuota likely
          prevents pod creation.
        description: >
          ReplicaSet {{ $labels.replicaset }} in namespace {{ $labels.namespace }}
          cannot reach its desired replica count. Pod creation is being rejected
          at admission, typically because the namespace ResourceQuota has been
          exhausted for one or more resources (cpu, memory, or pod count).
