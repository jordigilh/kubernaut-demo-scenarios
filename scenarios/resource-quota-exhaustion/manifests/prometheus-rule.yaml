apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-platform
  labels:
    release: prometheus
spec:
  groups:
  - name: demo-app
    rules:
    - alert: KubeResourceQuotaExhausted
      expr: |
        (
          kube_replicaset_spec_replicas{namespace="demo-platform"}
          -
          kube_replicaset_status_ready_replicas{namespace="demo-platform"}
        ) > 0
      for: 30s
      labels:
        severity: warning
      annotations:
        summary: >
          ReplicaSet {{ $labels.replicaset }} in namespace {{ $labels.namespace }}
          has {{ $value }} fewer ready pods than desired.
        description: >
          ReplicaSet {{ $labels.replicaset }} in namespace {{ $labels.namespace }}
          cannot reach its desired replica count. Workload capacity may be
          reduced until additional pods can start.
