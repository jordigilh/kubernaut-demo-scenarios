apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kubernaut-quota-rules
  namespace: demo-quota
  labels:
    release: prometheus
spec:
  groups:
  - name: kubernaut-resource-quota
    rules:
    - alert: KubeResourceQuotaExhausted
      expr: |
        (
          kube_replicaset_spec_replicas{namespace="demo-quota"}
          -
          kube_replicaset_status_ready_replicas{namespace="demo-quota"}
        ) > 0
      for: 3m
      labels:
        severity: warning
      annotations:
        summary: >
          ReplicaSet {{ $labels.replicaset }} in namespace {{ $labels.namespace }}
          has {{ $value }} fewer ready pods than desired. ResourceQuota likely
          prevents pod creation.
        description: >
          A ReplicaSet in the demo-quota namespace cannot reach its desired replica
          count because ResourceQuota prevents pod creation at admission (FailedCreate).
          Check: kubectl describe quota -n demo-quota && kubectl describe rs {{ $labels.replicaset }} -n demo-quota
