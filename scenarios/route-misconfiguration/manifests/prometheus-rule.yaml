apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-store
  labels:
    release: prometheus
spec:
  groups:
  - name: demo-app
    rules:
    - alert: RouteBackendUnavailable
      expr: |
        max by (exported_namespace, route) (
          haproxy_backend_up{
            exported_namespace="demo-store",
            route="storefront"
          } == 1
          unless on(exported_namespace, route)
          haproxy_server_up{
            exported_namespace="demo-store",
            route="storefront"
          }
        )
      for: 30s
      labels:
        severity: high
        namespace: demo-store
        route: storefront
      annotations:
        summary: >
          Route {{ $labels.route }} in namespace {{ $labels.namespace }}
          has no healthy backend servers.
        description: >
          External traffic to the route may be receiving errors.
          Service availability may be degraded.
