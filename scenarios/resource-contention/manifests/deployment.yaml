apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-worker
  namespace: demo-analytics
  labels:
    app: analytics-worker
    kubernaut.ai/managed: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-worker
  template:
    metadata:
      labels:
        app: analytics-worker
    spec:
      containers:
      - name: worker
        image: polinux/stress
        command: ["stress"]
        args: ["--vm", "1", "--vm-bytes", "64M", "--vm-hang", "0"]
        resources:
          requests:
            memory: "32Mi"
          limits:
            memory: "64Mi"
