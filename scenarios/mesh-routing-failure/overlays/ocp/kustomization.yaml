apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../manifests
patches:
  # Namespace: add OCP monitoring label
  - target:
      kind: Namespace
      name: demo-mesh-failure
    patch: |
      - op: add
        path: /metadata/labels/openshift.io~1cluster-monitoring
        value: "true"
  # PrometheusRule: remove release label for OCP user-workload monitoring
  - target:
      kind: PrometheusRule
      name: kubernaut-mesh-failure-rules
    patch: |
      - op: remove
        path: /metadata/labels/release
  # PodMonitor: move to app namespace and remove release label
  - target:
      kind: PodMonitor
      name: istio-proxy
    patch: |
      - op: replace
        path: /metadata/namespace
        value: demo-mesh-failure
      - op: remove
        path: /metadata/labels/release
  # Deployment api-server: swap to unprivileged nginx
  - target:
      kind: Deployment
      name: api-server
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: nginxinc/nginx-unprivileged:1.27-alpine
  # traffic-gen: add OCP-required securityContext
  - target:
      kind: Deployment
      name: traffic-gen
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/securityContext
        value:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop: ["ALL"]
