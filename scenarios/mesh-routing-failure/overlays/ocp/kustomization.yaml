apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../manifests
  # On OCP with OSSM 3, istio-proxy runs as a native sidecar (init container)
  # exposing Envoy stats on port 15090. PodMonitor cannot discover init-container
  # ports, so we use a headless Service + ServiceMonitor targeting port 15090.
  - istio-service.yaml
  - istio-servicemonitor.yaml
patches:
  # Do NOT add openshift.io/cluster-monitoring=true — that routes to platform
  # Prometheus and *excludes* the namespace from UWM. Istio ServiceMonitors and
  # PrometheusRules must be evaluated by UWM since that's where the metrics land.
  #
  # Remove the base PodMonitor — replaced by ServiceMonitor above.
  # OSSM 3 native sidecars (init containers) don't expose named ports that
  # PodMonitor can discover.
  - patch: |
      apiVersion: monitoring.coreos.com/v1
      kind: PodMonitor
      metadata:
        name: istio-proxy
        namespace: monitoring
      $patch: delete
  # PrometheusRule: remove Kind-specific release label and shrink IstioHighDenyRate
  # window from [5m] to [2m]. OCP scrape interval
  # is 1m — a [5m] rate needs ~6m to clear, exceeding the 5m EA stabilization
  # window and causing Inconclusive (#293).
  # PrometheusRule stays in demo-mesh (no cluster-monitoring label) so UWM
  # evaluates it against UWM-scraped istio_requests_total. The leaf-prometheus
  # label is required by the UWM ruleSelector.
  - target:
      kind: PrometheusRule
      name: demo-app-alerts
    patch: |
      - op: replace
        path: /metadata/name
        value: demo-app-alerts-mesh
      - op: remove
        path: /metadata/labels/release
      - op: add
        path: /metadata/labels/openshift.io~1prometheus-rule-evaluation-scope
        value: leaf-prometheus
      - op: replace
        path: /spec/groups/0/rules/0/expr
        value: "sum by (namespace)(rate(istio_requests_total{namespace=\"demo-mesh\", response_code=\"403\"}[2m])) > 0\n"
  # ServiceMonitor: remove Kind-specific release label for OCP UWM.
  - target:
      kind: ServiceMonitor
      name: demo-app-metrics
    patch: |
      - op: remove
        path: /metadata/labels/release
  # traffic-gen: add OCP-required securityContext
  - target:
      kind: Deployment
      name: traffic-gen
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/securityContext
        value:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop: ["ALL"]
