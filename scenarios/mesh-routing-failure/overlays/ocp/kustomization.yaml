apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../manifests
  # On OCP with OSSM 3, istio-proxy runs as a native sidecar (init container).
  # PodMonitor cannot discover init-container ports, so we replace the base
  # PodMonitor with a headless Service + ServiceMonitor that targets port 15020.
  - istio-service.yaml
  - istio-servicemonitor.yaml
patches:
  # Remove the base PodMonitor — replaced by ServiceMonitor above.
  # OSSM 3 native sidecars (init containers) don't expose named ports that
  # PodMonitor can discover.
  - patch: |
      apiVersion: monitoring.coreos.com/v1
      kind: PodMonitor
      metadata:
        name: istio-proxy
        namespace: monitoring
      $patch: delete
  # PrometheusRule: remove Kind-specific release label, add UWM evaluation scope,
  # and shrink IstioHighDenyRate window from [5m] to [2m]. OCP scrape interval
  # is 1m — a [5m] rate needs ~6m to clear, exceeding the 5m EA stabilization
  # window and causing Inconclusive (#293).
  - target:
      kind: PrometheusRule
      name: kubernaut-mesh-failure-rules
    patch: |
      - op: remove
        path: /metadata/labels/release
      - op: add
        path: /metadata/labels/openshift.io~1prometheus-rule-evaluation-scope
        value: leaf-prometheus
      - op: replace
        path: /spec/groups/0/rules/0/expr
        value: "sum by (namespace)(rate(istio_requests_total{namespace=\"demo-mesh-failure\", response_code=\"403\"}[2m])) > 0\n"
  # ServiceMonitor: remove Kind-specific release label for OCP UWM.
  - target:
      kind: ServiceMonitor
      name: demo-app-metrics
    patch: |
      - op: remove
        path: /metadata/labels/release
  # traffic-gen: add OCP-required securityContext
  - target:
      kind: Deployment
      name: traffic-gen
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/securityContext
        value:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop: ["ALL"]
