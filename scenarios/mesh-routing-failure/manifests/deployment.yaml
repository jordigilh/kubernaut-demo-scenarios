apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: demo-mesh-failure
  labels:
    app: api-server
    kubernaut.ai/managed: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
      - name: api-server
        image: quay.io/kubernaut-cicd/demo-http-server:1.0.0
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: CONFIG_PATH
          value: /etc/demo-http-server/config.yaml
        volumeMounts:
        - name: config
          mountPath: /etc/demo-http-server/config.yaml
          subPath: config.yaml
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 3
      volumes:
      - name: config
        configMap:
          name: api-server-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-server-config
  namespace: demo-mesh-failure
data:
  config.yaml: |
    port: 8080
    routes:
      - path: /
        status: 200
        body: 'ok'
      - path: /healthz
        status: 200
        body: 'ok'
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: demo-mesh-failure
  labels:
    app: api-server
    kubernaut.ai/managed: "true"
    kubernaut.ai/metrics: "true"
spec:
  selector:
    app: api-server
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-gen
  namespace: demo-mesh-failure
  labels:
    app: traffic-gen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-gen
  template:
    metadata:
      labels:
        app: traffic-gen
    spec:
      containers:
      - name: curl-loop
        image: curlimages/curl:8.12.1
        command: ["/bin/sh", "-c"]
        args:
          - |
            while true; do
              curl -s -o /dev/null http://api-server:8080/ || true
              sleep 0.5
            done
        resources:
          requests:
            memory: "16Mi"
            cpu: "5m"
          limits:
            memory: "32Mi"
            cpu: "20m"
