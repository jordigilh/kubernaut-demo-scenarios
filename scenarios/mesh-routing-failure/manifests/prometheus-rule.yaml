apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-mesh
  labels:
    release: kube-prometheus-stack
spec:
  groups:
  - name: demo-app
    rules:
    - alert: IstioHighDenyRate
      expr: |
        sum by (namespace)(rate(istio_requests_total{namespace="demo-mesh", response_code="403"}[5m])) > 0
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: >
          HTTP 403 responses detected for inbound requests in
          namespace {{ $labels.namespace }}.
        description: >
          The istio_requests_total metric with response_code=403 is rising,
          indicating inbound HTTP requests are being rejected. Service-to-service
          communication may be unavailable.
    - alert: IstioRequestsUnauthorized
      expr: |
        sum by (namespace)(rate(istio_requests_total{namespace="demo-mesh", response_code="403"}[2m])) > 0.1
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: >
          Sustained HTTP 403 responses detected in
          namespace {{ $labels.namespace }}.
        description: >
          Inbound HTTP requests to workloads in namespace {{ $labels.namespace }}
          are being rejected at a sustained rate, causing service
          unavailability for clients.
