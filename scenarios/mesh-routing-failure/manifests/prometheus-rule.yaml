apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kubernaut-mesh-failure-rules
  namespace: demo-mesh-failure
  labels:
    release: kube-prometheus-stack
spec:
  groups:
  - name: kubernaut-mesh-failure
    rules:
    - alert: IstioHighDenyRate
      expr: |
        sum by (namespace)(rate(istio_requests_total{namespace="demo-mesh-failure", response_code="403"}[5m])) > 0
      for: 3m
      labels:
        severity: critical
      annotations:
        summary: >
          Istio AuthorizationPolicy is denying inbound HTTP requests
          in namespace demo-mesh-failure.
        description: >
          The istio_requests_total metric with response_code=403 is rising,
          indicating an Istio AuthorizationPolicy is blocking legitimate
          traffic. This is typically caused by a DENY policy matching all
          requests.
    - alert: IstioRequestsUnauthorized
      expr: |
        sum by (namespace)(rate(istio_requests_total{namespace="demo-mesh-failure", response_code="403"}[2m])) > 0.1
      for: 3m
      labels:
        severity: critical
      annotations:
        summary: >
          Sustained Istio authorization denials detected in
          namespace demo-mesh-failure.
        description: >
          An Istio AuthorizationPolicy is actively denying inbound traffic
          to workloads in namespace demo-mesh-failure, causing service
          unavailability for meshed clients.
