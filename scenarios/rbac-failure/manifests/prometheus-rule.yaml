apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-monitoring
  labels:
    release: prometheus
spec:
  groups:
    - name: demo-app
      rules:
        - alert: RBACPolicyDenied
          expr: |
            kube_deployment_status_replicas_available{
              namespace="demo-monitoring",
              deployment="metrics-collector"
            } == 0
            and
            kube_deployment_spec_replicas{
              namespace="demo-monitoring",
              deployment="metrics-collector"
            } > 0
          for: 60s
          labels:
            severity: high
          annotations:
            summary: >
              Deployment metrics-collector in namespace {{ $labels.namespace }}
              has zero available replicas despite spec.replicas > 0.
            description: >
              Deployment {{ $labels.deployment }} in namespace {{ $labels.namespace }}
              has zero available replicas. The pods are failing their readiness
              probes and workload availability is degraded.
