apiVersion: v1
kind: ServiceAccount
metadata:
  name: metrics-collector
  namespace: demo-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: metrics-collector
  namespace: demo-monitoring
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: metrics-collector-binding
  namespace: demo-monitoring
subjects:
  - kind: ServiceAccount
    name: metrics-collector
    namespace: demo-monitoring
roleRef:
  kind: Role
  name: metrics-collector
  apiGroup: rbac.authorization.k8s.io
