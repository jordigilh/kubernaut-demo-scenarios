apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-ingress
  labels:
    release: prometheus
spec:
  groups:
  - name: demo-app
    rules:
    - alert: KubePodCrashLooping
      expr: |
        increase(
          kube_pod_container_status_restarts_total{
            namespace="demo-ingress",
            container="api-gateway"
          }[1m]
        ) > 0
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: >
          Container {{ $labels.container }} in pod {{ $labels.pod }} is in
          CrashLoopBackOff with {{ $value | humanize }} restarts in the last 10 minutes.
        description: >
          Multiple pods in the api-gateway deployment are crashing simultaneously.
