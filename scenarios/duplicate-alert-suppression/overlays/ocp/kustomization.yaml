apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../manifests
patches:
  - target:
      kind: Namespace
      name: demo-alert-storm
    patch: |
      - op: add
        path: /metadata/labels/openshift.io~1cluster-monitoring
        value: "true"
  - target:
      kind: PrometheusRule
      name: kubernaut-dedup-rules
    patch: |
      - op: remove
        path: /metadata/labels/release
      # OCP kube-state-metrics scrape interval is 1m (vs 30s on Kind).
      # increase(...[10m]) needs ~10m+ to clear after remediation on OCP,
      # far exceeding the 5m EA stabilization window. Shrink to [5m] so
      # the alert resolves within EA's window (#293).
      - op: replace
        path: /spec/groups/0/rules/0/expr
        value: "increase(\n  kube_pod_container_status_restarts_total{\n    namespace=\"demo-alert-storm\",\n    container=\"api-gateway\"\n  }[5m]\n) > 3\n"
  - target:
      kind: ServiceMonitor
      name: demo-app-metrics
    patch: |
      - op: remove
        path: /metadata/labels/release
