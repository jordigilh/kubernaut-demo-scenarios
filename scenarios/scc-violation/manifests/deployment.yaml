apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-agent
  namespace: demo-scc
  labels:
    app: metrics-agent
    kubernaut.ai/managed: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-agent
  template:
    metadata:
      labels:
        app: metrics-agent
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: metrics-agent
        image: busybox:1.36
        command: ["/bin/sh", "-c", "while true; do sleep 3600; done"]
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
