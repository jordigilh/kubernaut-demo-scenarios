apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-agent
  namespace: demo-agents
  labels:
    app: metrics-agent
    kubernaut.ai/managed: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-agent
  template:
    metadata:
      labels:
        app: metrics-agent
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: metrics-agent
        image: registry.k8s.io/e2e-test-images/busybox:1.29-2
        command: ["/bin/sh", "-c", "while true; do sleep 3600; done"]
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
