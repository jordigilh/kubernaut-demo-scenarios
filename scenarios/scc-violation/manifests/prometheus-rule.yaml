apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-agents
  labels:
    release: prometheus
spec:
  groups:
  - name: demo-app
    rules:
    - alert: SCCViolationPodBlocked
      expr: |
        kube_deployment_status_replicas_available{
          namespace="demo-agents",
          deployment="metrics-agent"
        } == 0
        and
        kube_deployment_spec_replicas{
          namespace="demo-agents",
          deployment="metrics-agent"
        } > 0
      for: 60s
      labels:
        severity: high
      annotations:
        summary: >
          Deployment metrics-agent in namespace {{ $labels.namespace }}
          has zero available replicas despite spec.replicas > 0.
        description: >
          Deployment {{ $labels.deployment }} in namespace {{ $labels.namespace }}
          has zero available replicas despite a non-zero replica spec. The
          ReplicaSet is unable to create pods and workload availability
          is degraded.
