apiVersion: v1
kind: Service
metadata:
  name: kv-store
  namespace: demo-statefulset
  labels:
    app: kv-store
    kubernaut.ai/managed: "true"
    kubernaut.ai/metrics: "true"
spec:
  clusterIP: None
  selector:
    app: kv-store
  ports:
  - port: 8080
    targetPort: 8080
    name: http
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kv-store
  namespace: demo-statefulset
  labels:
    app: kv-store
    kubernaut.ai/managed: "true"
spec:
  serviceName: kv-store
  replicas: 3
  selector:
    matchLabels:
      app: kv-store
  template:
    metadata:
      labels:
        app: kv-store
    spec:
      containers:
      - name: kv-store
        image: quay.io/kubernaut-cicd/demo-http-server:1.0.0
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: CONFIG_PATH
          value: /etc/demo-http-server/config.yaml
        volumeMounts:
        - name: data
          mountPath: /data
        - name: config
          mountPath: /etc/demo-http-server/config.yaml
          subPath: config.yaml
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 3
      volumes:
      - name: config
        configMap:
          name: kv-store-config
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 100Mi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kv-store-config
  namespace: demo-statefulset
data:
  config.yaml: |
    port: 8080
    routes:
      - path: /
        status: 200
        body: 'ok'
      - path: /healthz
        status: 200
        body: 'ok'
