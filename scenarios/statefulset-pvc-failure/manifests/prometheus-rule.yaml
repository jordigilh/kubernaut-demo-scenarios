apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: demo-keystore
  labels:
    release: prometheus
spec:
  groups:
  - name: demo-app
    rules:
    - alert: KubeStatefulSetReplicasMismatch
      expr: |
        kube_statefulset_status_replicas_ready{
          namespace="demo-keystore",
          statefulset="kv-store"
        }
        <
        kube_statefulset_replicas{
          namespace="demo-keystore",
          statefulset="kv-store"
        }
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: >
          StatefulSet {{ $labels.statefulset }} has
          {{ $value }} ready replicas vs desired.
        description: >
          The kv-store workload in namespace {{ $labels.namespace }} has fewer
          ready replicas than desired. Service availability may be degraded.
